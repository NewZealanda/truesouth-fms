<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="True South FMS">
<meta name="theme-color" content="#0f1117">
<meta name="mobile-web-app-capable" content="yes">
<title>True South FMS</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<style>
/* ── Reset & Base ── */
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#1a1f2e;--card:#0f172a;--card2:#080d14;--border:#1e293b;--border2:#334155;
  --text:#f1f5f9;--text2:#cbd5e1;--text3:#94a3b8;
  --sky:#7B9EC6;--sky2:#4A6D96;
  --ok-bg:#052e16;--ok-border:#166534;--ok-text:#86efac;
  --warn-bg:#1c1003;--warn-border:#854d0e;--warn-text:#fcd34d;
  --err-bg:#2d0a0a;--err-border:#7f1d1d;--err-text:#fca5a5;
}
html,body{height:100%;min-height:100dvh;min-height:-webkit-fill-available;background:#0f172a;color:var(--text);font-family:'Barlow',sans-serif;}
input,select,textarea{font-family:inherit;font-size:14px;outline:none;}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.7);}

/* ── Form Elements ── */
.fi{width:100%;padding:8px 10px;border-radius:7px;border:1.5px solid var(--border2);background:var(--card);color:var(--text);}
.fi:focus{border-color:var(--sky);box-shadow:0 0 0 3px rgba(123,158,198,.15);}
select.fi option{background:var(--card);color:var(--text);}
label{font-size:11px;font-weight:600;color:var(--text2);display:block;margin-bottom:3px;letter-spacing:.04em;text-transform:uppercase;}

/* ── Cards ── */
.card{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:16px;margin-bottom:12px;}
.st{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text2);border-bottom:1px solid var(--border);padding-bottom:6px;margin-bottom:12px;}

/* ── Grids ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}

/* ── Badges ── */
.badge{border-radius:8px;padding:8px 10px;}
.bok{background:var(--ok-bg);border:1px solid var(--ok-border);color:var(--ok-text);}
.berr{background:var(--err-bg);border:1px solid var(--err-border);color:var(--err-text);}
.bwarn{background:var(--warn-bg);border:1px solid var(--warn-border);color:var(--warn-text);}
.blbl{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;}
.bval{font-size:17px;font-weight:800;font-variant-numeric:tabular-nums;}
.bsub{font-size:10px;opacity:.7;}

/* ── Buttons ── */
.btn{padding:9px 18px;border-radius:8px;border:none;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;}
.btn-sky{background:var(--sky);color:#fff;}.btn-sky:hover{background:var(--sky2);}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2);}.btn-ghost:hover{background:var(--border);}
.btn-red{background:transparent;color:var(--err-text);border:1px solid var(--err-border);}
.btn-green{background:transparent;color:var(--ok-text);border:1px solid var(--ok-border);}
.btn-full{width:100%;padding:12px;border-radius:10px;font-size:15px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;border:none;margin-top:10px;}
.btn-primary{background:linear-gradient(135deg,#7B9EC6,#4A6D96);color:#fff;}
.btn-disabled{background:var(--border);color:var(--text3);cursor:not-allowed;}

/* ── Pills ── */
.pill{font-size:11px;font-weight:700;padding:3px 8px;border-radius:5px;text-transform:uppercase;white-space:nowrap;}
.pill-blue{background:#0c1a3a;color:#93c5fd;}
.pill-green{background:var(--ok-bg);color:var(--ok-text);}
.pill-warn{background:var(--warn-bg);color:var(--warn-text);}
.pill-red{background:var(--err-bg);color:var(--err-text);}
.pill-orange{background:rgba(251,146,60,.18);color:#fb923c;border:1px solid rgba(251,146,60,.3);}

/* ── Tabs ── */
.nav-tab{padding:6px 12px;border-radius:6px;border:none;cursor:pointer;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;white-space:nowrap;transition:all .15s;}
.nav-tab.on{background:var(--sky);color:#fff;}
.nav-tab.off{background:rgba(255,255,255,.07);color:rgba(255,255,255,.75);}
.nav-tab.off:hover{background:rgba(255,255,255,.12);}

.sub-tab{padding:5px 14px;border-radius:20px;border:1px solid rgba(255,255,255,.13);cursor:pointer;font-size:12px;font-weight:600;background:rgba(255,255,255,.06);color:rgba(255,255,255,.5);white-space:nowrap;transition:background .15s,color .15s,border-color .15s;}
.sub-tab:hover{background:rgba(255,255,255,.11);color:rgba(255,255,255,.75);}
.sub-tab.on{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.3);color:#fff;font-weight:700;}

/* ── Solver boxes ── */
.solver-box{border-radius:10px;padding:12px 14px;margin-top:8px;border:1px solid;}
.solver-ok{background:var(--ok-bg);border-color:var(--ok-border);color:var(--ok-text);}
.solver-warn{background:var(--warn-bg);border-color:var(--warn-border);color:var(--warn-text);}
.solver-err{background:var(--err-bg);border-color:var(--err-border);color:var(--err-text);}

/* ── Sync dot ── */
.sync-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px;}
.dot-ok{background:#22c55e;}.dot-err{background:#ef4444;}.dot-spin{background:#f59e0b;animation:pulse .8s infinite;}.dot-live{background:#22c55e;box-shadow:0 0 6px #22c55e80;animation:livepulse 2s ease-in-out infinite;}.dot-connecting{background:#f59e0b;animation:pulse .8s infinite;}.dot-live{background:#22c55e;box-shadow:0 0 6px #22c55e80;animation:livepulse 2s ease-in-out infinite;}.dot-connecting{background:#f59e0b;animation:pulse .8s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}@keyframes livepulse{0%,100%{box-shadow:0 0 4px #22c55e60}50%{box-shadow:0 0 10px #22c55ea0}}@keyframes livepulse{0%,100%{box-shadow:0 0 4px #22c55e60}50%{box-shadow:0 0 10px #22c55ea0}}

/* ── AC Setup Cards ── */
.ac-card{border-radius:10px;border:1px solid var(--border);padding:12px;margin-bottom:10px;background:var(--card2);cursor:pointer;transition:all .15s;}
.ac-card.selected{border-width:2px;}
.ac-card:hover{border-color:var(--border2);}

/* ── Cabin / Seat Slots ── */
.cabin{border-radius:14px;padding:10px 8px;display:inline-block;}
.seat-row-wrap{display:flex;gap:8px;justify-content:center;margin-bottom:8px;}
.seat{width:66px;height:54px;border-radius:7px;border:2px solid rgba(255,255,255,.18);background:rgba(255,255,255,.07);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;transition:all .15s;position:relative;user-select:none;}
.seat:not(.filled):not(.crew):hover,.seat.drop-target{background:rgba(123,158,198,.2);border-color:var(--sky);}
.seat:not(.filled):not(.crew){background:rgba(255,255,255,.04);}
.seat.filled{border-radius:8px;}
.seat.filled:hover{border-color:#ef4444;}
.seat.crew{background:rgba(255,255,255,.22);border-color:rgba(255,255,255,.35);cursor:default;}
.seat.sel-src{border-color:#f59e0b;border-style:dashed;background:rgba(245,158,11,.14);}
.seat-lbl{font-size:8px;font-weight:700;color:rgba(255,255,255,.55);position:absolute;top:2px;left:4px;}
.seat-lbl-d{font-size:8px;font-weight:700;color:#475569;position:absolute;top:2px;left:4px;}
.seat-name{font-size:9px;font-weight:700;color:inherit;text-align:center;line-height:1.2;max-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.seat-wt{font-size:8px;color:inherit;opacity:.75;font-weight:600;}
.seat-dot{width:7px;height:7px;border-radius:50%;position:absolute;top:2px;right:3px;}

/* ── Pax Cards ── */
.pax-chip{padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:var(--card);
  cursor:pointer;display:flex;align-items:center;gap:7px;margin:3px;font-size:12px;color:var(--text);
  user-select:none;transition:all .15s;}
.pax-chip:hover{border-color:var(--sky);}
.pax-chip.sel{border-color:#f59e0b;background:var(--warn-bg);border-width:2px;}

/* ── Unassigned Pool ── */
.pool{min-height:54px;border-radius:10px;border:2px dashed var(--border);padding:6px;
  display:flex;flex-wrap:wrap;align-items:flex-start;background:var(--card2);}

/* ── Search / Sort bar ── */
.search-bar{position:relative;}
.search-bar input{padding-left:32px;}
.search-bar .icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none;}

/* ── Login ── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.login-box{background:var(--card);border-radius:16px;border:1px solid var(--border);padding:32px;width:100%;max-width:380px;}

/* ── Charter Calculator ── */
.leg-card{background:var(--card2);border-radius:10px;border:1px solid var(--border);padding:14px;margin-bottom:10px;position:relative;}

/* ── Dual aircraft seat view ── */
.quad-wrap{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;}

/* ── Misc ── */
canvas{touch-action:none;cursor:crosshair;display:block;width:100%;}
.icon-btn{width:32px;height:32px;border-radius:7px;border:1px solid var(--border2);background:transparent;
  cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:var(--text2);}
.icon-btn:hover{background:var(--border);}
.icon-btn.red{border-color:var(--err-border);color:var(--err-text);}
.icon-btn.green{border-color:var(--ok-border);color:var(--ok-text);}
.fuel-row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:end;}
.crew-row{display:grid;grid-template-columns:1fr 80px 32px 32px;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);}
.seat-row-edit{display:grid;grid-template-columns:1.5fr 90px 90px 32px;gap:8px;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);}

/* ── AC colour rings ── */
.ac-ring{width:12px;height:12px;border-radius:50%;flex-shrink:0;border:2px solid transparent;}

/* ── Scrollable content ── */
.page{max-width:760px;margin:0 auto;padding:14px 12px 80px;}
@keyframes lsFlash{0%{outline:3px solid #fbbf24;background:rgba(251,191,36,.18);}100%{outline:3px solid transparent;background:transparent;}}
.ls-flash{animation:lsFlash 2s ease-out;border-radius:6px;}
@media(min-width:900px){.page{max-width:1100px;padding:16px 28px 80px;}}
@media(min-width:1400px){.page{max-width:1400px;padding:16px 48px 80px;}}

.route-map{height:260px;border-radius:10px;border:1px solid var(--border);overflow:hidden;margin-top:10px;}
#login-overlay{
  position:fixed;inset:0;z-index:9999;display:none;
  align-items:center;justify-content:center;
  background-size:cover;
  background-position:center 30%;
  background-repeat:no-repeat;
}
/* ── Responsive ── */
@media(max-width:600px){
  input[type=date]{max-width:160px;box-sizing:border-box;min-width:0;}
  .g2{grid-template-columns:1fr;}
  .g3{grid-template-columns:1fr 1fr;}
  .page{padding:10px 8px max(100px,calc(env(safe-area-inset-bottom) + 80px));}

  /* Nav bar */
  .nav-bar{padding:6px 8px 4px;}
  .nav-tab{padding:5px 10px;font-size:11px;}
  .sub-tab{padding:5px 10px;font-size:11px;}

  /* Cards */
  .card{padding:10px 10px;}
  .st{font-size:14px;margin-bottom:10px;}

  /* Form inputs — 16px prevents iOS auto-zoom */
  .fi{padding:10px 10px;font-size:16px;}
  select.fi{font-size:16px;}

  /* W&B grid */
  .wb-grid{grid-template-columns:1fr 1fr!important;}

  /* Buttons */
  .btn-full{padding:14px;font-size:14px;}
  button{min-height:36px;}
}

@media(max-width:480px){
  /* Seat map - smaller on narrow phones */
  .seat{width:50px!important;height:44px!important;border-radius:6px;}
  .seat-name{font-size:8px;}
  .seat-wt{font-size:8px;}
  .seat-lbl{font-size:7px;}
  .seat-dot{width:5px;height:5px;top:2px;right:2px;}

  /* Loadsheet layout — stack seatmap/pods vertically on narrow screens */
  .ls-cols{flex-direction:column!important;}
  .ls-mid-col{flex:none!important;width:100%!important;}

  /* Pax row — tighter columns on narrow screens */
  .pax-row-grid{grid-template-columns:62px 40px 1fr 60px 48px 48px 24px!important;gap:3px!important;}

  /* Manifest aircraft cards — full width */
  .ac-card-grid{grid-template-columns:1fr!important;}

  /* Charter leg cards */
  .leg-card{padding:12px!important;}
}

@media(min-width:900px){
  /* Desktop: allow charter/admin grids to go wider */
  .charter-grid{grid-template-columns:1fr 1fr;}
  .stat-grid{grid-template-columns:repeat(3,1fr);}
}

/* PWA safe area padding for iPhone notch/home bar */
@supports(padding:max(0px)){
  .page{padding-bottom:max(80px,env(safe-area-inset-bottom) + 70px);}
  .nav-bar{padding-top:max(16px,env(safe-area-inset-top));padding-bottom:max(4px,env(safe-area-inset-bottom));}
}

/* Hide all number input spinners */
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button {
  -webkit-appearance: none;
  margin: 0;
}
input[type=number] { -moz-appearance: textfield; }
@keyframes ts-spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
@keyframes ts-fade-in{0%{opacity:0}100%{opacity:1}}
#loading-overlay{position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;background-size:cover;background-position:center;animation:ts-fade-in .2s ease}
#loading-overlay .ts-logo-spin{width:72px;height:72px;animation:ts-spin 1.1s linear infinite;filter:drop-shadow(0 0 18px rgba(255,255,255,.35))}
#loading-overlay .ts-loading-text{margin-top:22px;font-size:13px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.6)}
</style>
</head>

(function(){
  // Create icon with dark background for PWA/homescreen
  function makeIconDataURL(srcUrl,cb){
    var SIZE=512;
    var PAD=50; // padding around logo
    var canvas=document.createElement('canvas');
    canvas.width=SIZE;canvas.height=SIZE;
    var ctx=canvas.getContext('2d');
    // Black background
    ctx.fillStyle='#000000';
    ctx.fillRect(0,0,SIZE,SIZE);
    var img=new Image();
    img.onload=function(){
      // Scale logo to fit inside padded area, maintain aspect ratio
      var maxW=SIZE-PAD*2,maxH=SIZE-PAD*2;
      var scale=Math.min(maxW/img.width,maxH/img.height);
      var w=img.width*scale,h=img.height*scale;
      var x=(SIZE-w)/2,y=(SIZE-h)/2;
      ctx.imageSmoothingEnabled=true;
      ctx.imageSmoothingQuality='high';
      ctx.drawImage(img,x,y,w,h);
      cb(canvas.toDataURL('image/png'));
    };
    img.onerror=function(){cb(srcUrl);};
    img.src=srcUrl;
  }
  // Favicon (can use raw logo)
  var l=document.createElement('link');l.rel='icon';l.type='image/png';l.href=LOGO;document.head.appendChild(l);
  // Apple touch icon + manifest icon — use canvas version with background
  makeIconDataURL(LOGO,function(iconUrl){
    var a=document.createElement('link');a.rel='apple-touch-icon';a.href=iconUrl;document.head.appendChild(a);
    // Web app manifest
    var mf={name:'True South FMS',short_name:'TS FMS',start_url:'/',display:'standalone',
      background_color:'#1a2236',theme_color:'#1a2236',
      icons:[{src:iconUrl,sizes:'192x192',type:'image/png'},{src:iconUrl,sizes:'512x512',type:'image/png'}]};
    var blob=new Blob([JSON.stringify(mf)],{type:'application/manifest+json'});
    var ml=document.createElement('link');ml.rel='manifest';ml.href=URL.createObjectURL(blob);document.head.appendChild(ml);
  });
})();

function _getAllApts(){
  var base=typeof NZ_AERODROMES!=="undefined"?NZ_AERODROMES:[];

  custom.forEach(function(a){map[a.icao]=a;});
  return Object.values(map);
}
function _rebuildAptData(){
  var all=_getAllApts();

}
function aptOpts(sel){
  _rebuildAptData();

  var rest=all.filter(function(a){return _APT_PINNED.indexOf(a.icao)<0;});

}

function burnToKg(v,acId){const a=S.aircraft[acId];if(!a)return parseFloat(v)||0;const val=parseFloat(v)||0;if(a.burnDefUnit==='lbs') return val*LB;if(a.layout==='ga8'||a.burnDefUnit==='l'||a.burnDefUnit==='litres') return val*AVGAS;if(a.burnDefUnit==='kg') return val;return val*LB;}

// Row pairs = seats at same arm (same physical row)
function rowPairsForAc(acId){

  const byArm={};

// ── W&B Calculations ──
function calcAcWB(acId,paxList,fuelKgOverride){
  const a=S.aircraft[acId];if(!a)return null;
  const setup=S.dispatch.acSetup.find(s=>s.acId===acId);
  const picW=setup?S.crew.find(c=>c.n===setup.pic)?.w||0:0;
  let wt=a.ew+picW,mom=a.em+picW*a.seats[0].arm;
  if(seat1IsCoPilot(acId)){const cp=S.crew.find(c=>c.n===setup.coPilot);if(cp){wt+=cp.w;mom+=cp.w*a.seats[1].arm;}}
  // Use seat assignment from seatMap for proper arm calc
  const sm=S.dispatch.seatMap[acId]||{};
  paxSeatIdxs(acId).forEach(i=>{const p=sm[i]?paxById(sm[i]):null;if(p){const w=parseFloat(p.weight||0)+parseFloat(p.bag||0);wt+=w;mom+=w*a.seats[i].arm;}});
  const fW=fuelKgOverride!=null?fuelKgOverride:fuelKgForSetup(acId);
  wt+=fW;mom+=fW*a.fuelArm;const _gndBurn=parseFloat(a.gndBurn)||0;wt-=_gndBurn;mom-=_gndBurn*a.fuelArm;
  const tow=wt,cog=wt?mom/wt:0,burnKg=burnToKg(a.burnDef,acId);
  wt-=burnKg;mom-=burnKg*a.fuelArm;
  return{tow,cog,lw:wt,lwCog:wt?mom/wt:0,
    towOk:tow<=a.mtow,lwOk:wt<=a.mlw,cogOk:cog>=a.cogMin&&cog<=a.cogMax,
    towOver:Math.max(0,tow-a.mtow),lwOver:Math.max(0,wt-a.mlw),
    mtow:a.mtow,mlw:a.mlw,cogMin:a.cogMin,cogMax:a.cogMax};
}

// Score a candidate assignment (lower=better)
function scoreAssign(acId,paxList){
  const a=S.aircraft[acId];if(!a)return 1e9;
  const setup=S.dispatch.acSetup.find(s=>s.acId===acId);
  const picW=setup?S.crew.find(c=>c.n===setup.pic)?.w||0:0;
  const cpW=seat1IsCoPilot(acId)?(anyCrewList().find(c=>c.n===setup?.coPilot)?.w||0):0;
  const fW=fuelKgForSetup(acId);
  const sm=assignSeats(acId,paxList);
  let wt=a.ew+picW+cpW,mom=a.em+picW*a.seats[0].arm;
  if(seat1IsCoPilot(acId))mom+=cpW*a.seats[1].arm;
  Object.entries(sm).forEach(([idx,pid])=>{const p=S.dispatch.pax.find(x=>x.id===pid)||paxList.find(x=>x.id===pid);if(!p)return;const w=parseFloat(p.weight||0)+parseFloat(p.bag||0);wt+=w;mom+=w*a.seats[parseInt(idx)].arm;});
  wt+=fW;mom+=fW*a.fuelArm;wt-=a.gndBurn;mom-=a.gndBurn*a.fuelArm;
  const tow=wt,cog=mom/wt,wtOver=Math.max(0,tow-a.mtow);
  const cogMid=(a.cogMin+a.cogMax)/2,cogDev=Math.abs(cog-cogMid);
  const cogOver=cog<a.cogMin?a.cogMin-cog:cog>a.cogMax?cog-a.cogMax:0;
  return wtOver*1000+cogOver*500+cogDev;
}

// ── Seat Assignment Engine ──
// Rules: groups fill consecutive rows; heaviest groups front; solos to seat 1 if free; 
// co-pilot seat used for odd-group overflow if no co-pilot assigned
function assignSeats(acId,paxList){
  const a=S.aircraft[acId];if(!a||!paxList.length)return{};
  const rows=rowPairsForAc(acId); // [[idx,idx],...]  front-to-back
  if(!rows.length)return{};

  const result={};
  const rowFree=rows.map(r=>[...r]); // mutable free slots per row

  // Build groups - preserve order pax were entered (don't sort by weight here; optimizer handles that)
  const gMap={};
  paxList.forEach(p=>{const g=p.group?.trim()||'\x00solo\x00'+p.id;if(!gMap[g])gMap[g]={pax:[],isSolo:!p.group?.trim()};gMap[g].pax.push(p);});
  // Put multi-person groups first (so they get priority for consecutive rows), solos last
  const groups=[...Object.values(gMap).filter(g=>!g.isSolo&&g.pax.length>1),
                 ...Object.values(gMap).filter(g=>g.isSolo||g.pax.length===1)];

  // Helper: remove slot from rowFree
  function removeSlot(slot){for(const rf of rowFree){const i=rf.indexOf(slot);if(i>=0){rf.splice(i,1);return;}}}

  // Place a group into consecutive rows from front
  function placeGroup(members){
    // Keep members in their original order
    const sorted=[...members];
    let rem=[...sorted];

    // Try to pack the group into consecutive rows without gaps
    for(let startRow=0;startRow<rowFree.length&&rem.length>0;startRow++){
      // Collect consecutive free slots starting at startRow
      const slots=[];
      let prevRowIdx=startRow-1;
      for(let r=startRow;r<rowFree.length&&slots.length<rem.length;r++){
        if(r>startRow&&r!==prevRowIdx+1)break; // non-consecutive
        rowFree[r].forEach(s=>slots.push({r,s}));
        prevRowIdx=r;
      }
      if(slots.length>=rem.length){
        // Check continuity: all rows used must be consecutive row indices
        const usedRows=[...new Set(slots.slice(0,rem.length).map(x=>x.r))];
        const consecutive=usedRows.every((r,i)=>i===0||r===usedRows[i-1]+1);
        if(consecutive){
          slots.slice(0,rem.length).forEach(({r,s},i)=>{result[s]=rem[i].id;rowFree[r].splice(rowFree[r].indexOf(s),1);});
          return true;
        }
      }
    }
    // Fallback: fill any free slots
    const allFree=rowFree.flat();
    rem.forEach((p,i)=>{if(i<allFree.length){result[allFree[i]]=p.id;removeSlot(allFree[i]);}});
    return false;
  }

  // Multi-person groups first
  groups.filter(g=>!g.isSolo&&g.pax.length>1).forEach(g=>placeGroup(g.pax));

  // Singles: prefer seat index 1 (co-pilot slot) if free and no co-pilot
  const solos=groups.filter(g=>g.isSolo||g.pax.length===1);
  if(!seat1IsCoPilot(acId)){
    const seat1Row=rowFree.find(r=>r.includes(1));
    solos.forEach(g=>{
      const p=g.pax[0];
      if(seat1Row&&seat1Row.includes(1)&&!result[1]){result[1]=p.id;removeSlot(1);}
      else{const allFree=rowFree.flat();if(allFree.length>0){result[allFree[0]]=p.id;removeSlot(allFree[0]);}}
    });
  } else {
    solos.forEach(g=>{placeGroup(g.pax);});
  }

  return result;
}



// Feasibility-first scoring using least-squares CoG optimisation.
// Key: check if ANY valid seating exists before scoring, and return
// score=1e9 immediately if the group assignment is mathematically infeasible.
function calcAcScore(acId, paxList, fuelKgOv){
  const a=S.aircraft[acId]; if(!a||!paxList.length) return {score:1e9,tow:0,cog:0,towOk:false,cogOk:false,towOver:0};
  const setup=S.dispatch.acSetup.find(s=>s.acId===acId);
  const picW=setup?S.crew.find(c=>c.n===setup.pic)?.w||0:0;
  const cpW=seat1IsCoPilot(acId)?(anyCrewList().find(c=>c.n===setup?.coPilot)?.w||0):0;
  const fW=fuelKgOv!=null?fuelKgOv:fuelKgForSetup(acId);
  const hasCoPilot=seat1IsCoPilot(acId);
  const cogTarget=(a.cogMin+a.cogMax)/2;

  // Seat arms for pax seats (index 0 = seat 1, index 1 = seat 2, etc)
  const paxSeats=paxSeatIdxs(acId); // e.g. [1,2,3,4,5,6,7] for airvan without copilot
  const seatArms=paxSeats.map(i=>a.seats[i].arm);

  // Base weight and moment (aircraft + crew + fuel, no pax)
  const baseWt=a.ew+picW+cpW+fW-a.gndBurn;
  let baseMom=a.em+picW*a.seats[0].arm+fW*a.fuelArm-a.gndBurn*a.fuelArm;
  if(hasCoPilot) baseMom+=cpW*a.seats[1].arm;

  // Quick TOW check
  const totalPaxW=paxList.reduce((s,p)=>s+parseFloat(p.weight||0)+parseFloat(p.bag||0),0);
  const tow=baseWt+totalPaxW;
  const towOver=Math.max(0,tow-a.mtow);
  if(towOver>(a.fuelOver||50)+100) return{score:1e9+towOver*1000,tow,cog:cogTarget,towOk:false,cogOk:false,towOver};

  // ── Feasibility check: can ANY seating achieve legal CoG? ──
  // Uses group-aware best-case: respects that paired groups go in row pairs (arm > seat1 arm)
  {
    const sortedArms=[...paxSeats].map(i=>a.seats[i].arm).sort((a,b)=>a-b);
    const sortedW=[...paxList].map(p=>parseFloat(p.weight||0)+parseFloat(p.bag||0)).sort((a,b)=>b-a);
    
    // Best case ignoring groups (absolute minimum achievable CoG)
    let bestMom=baseMom; const bestWt=baseWt+totalPaxW;
    sortedW.forEach((w,i)=>{if(i<sortedArms.length)bestMom+=w*sortedArms[i];});
    const absMinCog=bestMom/bestWt;
    
    // If even the absolute best (ignoring groups) is over the limit → truly infeasible
    if(absMinCog>a.cogMax){
      return{score:1e7+(absMinCog-a.cogMax)*10000,tow,cog:absMinCog,towOk:tow<=a.mtow+(a.fuelOver||50),cogOk:false,towOver,
        infeasible:false}; // allow as fallback
    }
    
    // Group-aware best case: build groups, estimate CoG with groups in consecutive rows
    // Heaviest group fills first row pair, next group fills next row pair, etc.
    // This gives a realistic best-case CoG estimate
    const gMapF={};
    paxList.forEach(p=>{const g=p.group?.trim()||''+p.id;if(!gMapF[g])gMapF[g]=[];
      gMapF[g].push(parseFloat(p.weight||0)+parseFloat(p.bag||0));});
    const groupWeights=Object.values(gMapF).map(ws=>({ws,total:ws.reduce((s,w)=>s+w,0)}))
      .sort((a,b)=>b.total-a.total);
    
    const hasSeat1=!hasCoPilot&&paxSeats.includes(1);
    const pairArms=sortedArms.filter((_,i)=>hasSeat1?i>0:true); // arms excluding seat1
    
    // Seat1 gets heaviest available solo or lightest odd-group member
    let s1w=0;
    if(hasSeat1){
      // Find best seat1 candidate
      for(const g of groupWeights){
        if(g.ws.length%2!==0){s1w=Math.min(...g.ws);break;}
      }
      if(!s1w) s1w=groupWeights.find(g=>g.ws.length===1)?.ws[0]||0;
    }
    
    // Place remaining groups in pair rows (heaviest first = best for aft CoG)
    let estMom=baseMom+(s1w>0?s1w*a.seats[1].arm:0);
    let pairIdx=0;
    for(const g of groupWeights){
      const members=s1w>0&&g.ws.length%2!==0?g.ws.filter(w=>w!==s1w||g.ws.indexOf(w)>0):[...g.ws];
      if(!members.length)continue;
      const sortedM=[...members].sort((a,b)=>b-a);
      sortedM.forEach(w=>{
        if(pairIdx<pairArms.length)estMom+=w*pairArms[pairIdx++];
      });
    }
    const estCog=estMom/bestWt;
    
    // If group-aware estimate is over CoG limit → infeasible, penalise heavily
    if(estCog>a.cogMax){
      return{score:1e9+(estCog-a.cogMax)*10000,tow,cog:estCog,
        towOk:tow<=a.mtow+(a.fuelOver||50),cogOk:false,towOver};
    }
  }

  // ── Least-squares scoring: try 3 arrangements, return minimum squared deviation ──
  const rows=rowPairsForAc(acId);
  const pairRows=rows.map(r=>r.filter(si=>si!==1)).filter(r=>r.length>0);
  const seat1Avail=!hasCoPilot&&rows.some(r=>r.includes(1));

  // Build groups
  const gMap={};
  paxList.forEach(p=>{
    const g=p.group?.trim()||''+p.id;
    if(!gMap[g]) gMap[g]={pax:[],solo:!p.group?.trim()};
    gMap[g].pax.push(p);
  });
  const allG=Object.values(gMap);
  const multiG=allG.filter(g=>!g.solo&&g.pax.length>1).sort((a,b)=>
    b.pax.reduce((s,p)=>s+parseFloat(p.weight||0)+parseFloat(p.bag||0),0)-
    a.pax.reduce((s,p)=>s+parseFloat(p.weight||0)+parseFloat(p.bag||0),0));
  const soloG=allG.filter(g=>g.solo||g.pax.length===1).sort((a,b)=>
    (parseFloat(b.pax[0].weight||0)+parseFloat(b.pax[0].bag||0))-
    (parseFloat(a.pax[0].weight||0)+parseFloat(a.pax[0].bag||0)));

  function cogFromArrangement(s1w, groupOrder){
    let mom=baseMom, wt=baseWt+totalPaxW;
    if(s1w>0) mom+=s1w*a.seats[1].arm;
    let ri=0;
    for(const g of groupOrder){
      const ms=[...g.pax].filter(p=>{
        const w=parseFloat(p.weight||0)+parseFloat(p.bag||0);
        return !(s1w>0 && w===s1w && g.pax.length===1); // skip if this is the seat1 pax
      }).sort((a,b)=>(parseFloat(b.weight||0)+parseFloat(b.bag||0))-(parseFloat(a.weight||0)+parseFloat(a.bag||0)));
      for(let i=0;i<ms.length;i++){
        const slotRi=Math.floor(i/2)+ri;
        const slotSide=i%2;
        if(slotRi<pairRows.length){
          const si=pairRows[slotRi][slotSide]||pairRows[slotRi][0];
          mom+=( parseFloat(ms[i].weight||0)+parseFloat(ms[i].bag||0))*a.seats[si].arm;
        }
      }
      ri+=Math.ceil(ms.length/2);
    }
    return mom/wt;
  }

  // Determine best seat-1 candidate
  let s1w=0;
  if(seat1Avail){
    // Prefer lightest member of heaviest odd group, else heaviest solo
    for(const g of multiG){
      if(g.pax.length%2!==0){
        const sorted=[...g.pax].sort((a,b)=>(parseFloat(a.weight||0)+parseFloat(a.bag||0))-(parseFloat(b.weight||0)+parseFloat(b.bag||0)));
        s1w=parseFloat(sorted[0].weight||0)+parseFloat(sorted[0].bag||0);
        break;
      }
    }
    if(!s1w&&soloG.length) s1w=parseFloat(soloG[0].pax[0].weight||0)+parseFloat(soloG[0].pax[0].bag||0);
  }

  // Try heaviest groups front and reversed
  const cog1=cogFromArrangement(s1w,[...multiG,...soloG]);
  const cog2=cogFromArrangement(s1w,[...multiG,...soloG].reverse());
  
  let bestDev=1e9, bestCog=null;
  [cog1,cog2].forEach(c=>{
    if(!c||isNaN(c)) return;
    const violation=c<a.cogMin?(a.cogMin-c)**2*100000:c>a.cogMax?(c-a.cogMax)**2*100000:0;
    const dev=(c-cogTarget)**2+violation;
    if(dev<bestDev){bestDev=dev;bestCog=c;}
  });

  if(bestCog===null) bestCog=cogTarget;
  return{tow,cog:bestCog,towOk:tow<=a.mtow+(a.fuelOver||50),
    cogOk:bestCog>=a.cogMin&&bestCog<=a.cogMax,towOver,score:bestDev+towOver*500};
}


// ── Auto-Allocate Engine ──
// Uses branch-and-bound to assign groups to aircraft (never splits groups)
// then heaviest-front seat assignment within each aircraft

function acPayloadBudget(acId){
  // Max pax+bag weight that can legally go on this aircraft
  const a=S.aircraft[acId]; if(!a) return 0;
  const setup=S.dispatch.acSetup.find(s=>s.acId===acId);
  const picW=S.crew.find(c=>c.n===setup?.pic)?.w||90;
  const cpW=seat1IsCoPilot(acId)?(anyCrewList().find(c=>c.n===setup?.coPilot)?.w||0):0;
  const fW=fuelKgForSetup(acId);
  return a.mtow - a.ew - picW - cpW - fW + a.gndBurn;
}

function autoAllocate(){
  const d=S.dispatch;
  const acs=d.acSetup.map(s=>s.acId).filter(id=>S.aircraft[id]);
  if(!acs.length||!d.pax.length){
    toast('Select aircraft with a PIC and add passengers first.','warn');return;
  }

  d.seatMap=d.seatMap||{};d.origAcMap=d.origAcMap||{};

  // Only seat pax without a seat already
  const alreadySeated=new Set(Object.values(d.seatMap).flatMap(sm=>Object.values(sm||{})));
  const unseated=d.pax.filter(p=>!alreadySeated.has(p.id));

  // ── Assign each unseated pax to aircraft ──
  const acPax={};
  acs.forEach(id=>{acPax[id]=[];});

  const pinned=unseated.filter(p=>p.pinAc&&acs.includes(p.pinAc));
  const unpinned=unseated.filter(p=>!p.pinAc||!acs.includes(p.pinAc));
  pinned.forEach(p=>acPax[p.pinAc].push(p));

  // Capacity = available empty seats per aircraft
  const caps={};
  acs.forEach(id=>{
    const occupied=Object.keys(d.seatMap[id]||{}).length;
    caps[id]=Math.max(0,paxSeatIdxs(id).length-occupied);
  });

  const remaining=[...unpinned];
  remaining.sort((a,b)=>{
    if((a.group||'')!==(b.group||'')) return (a.group||'').localeCompare(b.group||'');
    return (parseFloat(b.weight||0)+parseFloat(b.bag||0))-(parseFloat(a.weight||0)+parseFloat(a.bag||0));
  });
  remaining.forEach(p=>{
    const best=acs.filter(id=>acPax[id].length<caps[id])
      .sort((a,b)=>(caps[b]-acPax[b].length)-(caps[a]-acPax[a].length))[0];
    if(best) acPax[best].push(p);
  });

  // ── Assign seats, merging with existing (existing takes priority) ──
  acs.forEach(id=>{
    const existing=d.seatMap[id]||{};
    const toSeat=acPax[id]||[];
    if(!toSeat.length){d.seatMap[id]=existing;return;}
    const newAssignment=assignSeatsHeavyFront(id,toSeat);
    // Only fill empty seats
    Object.entries(newAssignment).forEach(([idx,pid])=>{
      const i=parseInt(idx);if(!existing[i])existing[i]=pid;
    });
    d.seatMap[id]=existing;
  });

  // ── Check W&B and flag issues ──
  S.tab='seatmap';S.lockedAcs=[];S.mobileAcIdx=0;S.viewAcs=[...acs];window.scrollTo(0,0);
  runSolver();

  const issues=[];
  acs.forEach(id=>{
    const r=S.solverRes[id];if(!r) return;
    const a=S.aircraft[id];
    if(r.towOver>0) issues.push(id+' overweight by '+r.towOver.toFixed(0)+'kg');
    if(!r.cogOk) issues.push(id+' CoG out of limits ('+r.cog?.toFixed(1)+'")');
  });
  if(issues.length){
    toast('⚠ W&B issues: '+issues.join(' · '),'warn');
  } else {
    toast('Seats allocated. Check W&B above.','ok');
  }
  autoSaveDispatch();render();
}

// ── Seat assignment within one aircraft ──
// Tries to keep groups in consecutive rows.
// If CoG exceeds hard limit after grouped placement, splits the minimum
// number of passengers (one person to seat 1) to bring CoG within limits.
// CoG calculator for a seat assignment map
function cogForMap(acId, seatMap, paxListRef){
  const ac=S.aircraft[acId]; if(!ac) return 0;
  let totalW=0, totalMom=0;
  Object.entries(seatMap).forEach(([si,pid])=>{
    const p=paxListRef.find(x=>x.id===pid);
    if(!p) return;
    const w=parseFloat(p.weight||0)+parseFloat(p.bag||0);
    const arm=ac.seats[parseInt(si)]?.arm||0;
    totalW+=w; totalMom+=w*arm;
  });
  return totalW>0?totalMom/totalW:0;
}

function assignSeatsHeavyFront(acId, paxList){
  // Rules (in priority order):
  // 1. MTOW: heaviest pax forward keeps TOW manageable & CoG fwd
  // 2. Groups together side-by-side in pair rows
  //    - If odd group size: heaviest member of group goes to Seat 1 if available
  // 3. CoG within limits (heaviest forward is the primary mechanism)

  const a=S.aircraft[acId];
  if(!a||!paxList.length) return{};

  const paxIdxs=paxSeatIdxs(acId);
  if(!paxIdxs.length) return{};

  // Seat layout: sorted front-to-back by arm
  const seatsByArm=[...paxIdxs].sort((a,b)=>(S.aircraft[acId].seats[a]?.arm||999)-(S.aircraft[acId].seats[b]?.arm||999));
  const seat1Idx=seatsByArm[0]; // frontmost pax seat
  const hasSeat1=!seat1IsCoPilot(acId);

  // All pax heaviest first
  const byWeight=[...paxList].sort((a,b)=>
    (parseFloat(b.weight||0)+parseFloat(b.bag||0))-
    (parseFloat(a.weight||0)+parseFloat(a.bag||0)));

  // Build groups (group name → pax list, heaviest first within group)
  const grpMap={};
  paxList.forEach(p=>{
    const g=p.group?.trim()||('_solo_'+p.id);
    if(!grpMap[g]) grpMap[g]=[];
    grpMap[g].push(p);
  });
  // Sort each group heaviest first
  Object.values(grpMap).forEach(arr=>arr.sort((a,b)=>
    (parseFloat(b.weight||0)+parseFloat(b.bag||0))-
    (parseFloat(a.weight||0)+parseFloat(a.bag||0))));

  // Split groups into: even (fits in pair rows neatly) vs odd (has a leftover member)
  const evenGroups=[], oddGroups=[], seatOneQueue=[];
  Object.entries(grpMap).forEach(([g,members])=>{
    if(members.length===1){
      seatOneQueue.push(members[0]); // solo → goes in seat1 or leftover slots
    } else if(members.length%2===0){
      evenGroups.push(members);
    } else {
      // Odd group: heaviest member goes to seat1, rest get priority front pair row
      seatOneQueue.push(members[0]); // heaviest → seat1
      if(members.length>1){
        // Mark as priority so they fill the FIRST pair row (behind seat1 member)
        members.slice(1)._priority=true;
        evenGroups.unshift(members.slice(1)); // front of queue → first pair row
      }
    }
  });

  // Sort even groups heaviest-pair-first (sum of group weights)
  evenGroups.sort((a,b)=>
    b.reduce((s,p)=>s+parseFloat(p.weight||0)+parseFloat(p.bag||0),0)-
    a.reduce((s,p)=>s+parseFloat(p.weight||0)+parseFloat(p.bag||0),0));

  // Sort seat1Queue heaviest first (heaviest odd-member or solo gets seat1)
  seatOneQueue.sort((a,b)=>
    (parseFloat(b.weight||0)+parseFloat(b.bag||0))-
    (parseFloat(a.weight||0)+parseFloat(a.bag||0)));

  // Get pair rows (exclude seat1 slot)
  const rows=rowPairsForAc(acId); // [[1],[2,3],[4,5]...]
  const pairRows=rows.filter(r=>r.length===2); // only the 2-seat rows
  const seat1Row=rows.find(r=>r.length===1); // the single seat1 slot

  const result={};
  const placed=new Set();

  // ── Phase 1: Fill pair rows with even groups (heaviest groups first = front rows) ──
  let pairRowIdx=0;
  for(const grp of evenGroups){
    // Place group in consecutive pair rows
    for(let i=0;i<grp.length;i+=2){
      if(pairRowIdx>=pairRows.length) break;
      const row=pairRows[pairRowIdx++];
      const [heavy,light]=[grp[i],grp[i+1]];
      result[row[0]]=heavy.id; placed.add(heavy.id);
      if(light){result[row[1]]=light.id; placed.add(light.id);}
    }
  }

  // ── Phase 2: Place seat1 queue ──
  // Best candidate for seat1: heaviest of seatOneQueue
  if(hasSeat1&&seat1Row&&seatOneQueue.length>0){
    const s1pax=seatOneQueue.shift(); // heaviest
    result[seat1Row[0]]=s1pax.id; placed.add(s1pax.id);
  }

  // ── Phase 3: Fill remaining pair rows with leftover seatOneQueue pax ──
  // Pair them up and fill rows heaviest first
  while(seatOneQueue.length>0&&pairRowIdx<pairRows.length){
    const row=pairRows[pairRowIdx++];
    const p1=seatOneQueue.shift();
    result[row[0]]=p1.id; placed.add(p1.id);
    if(seatOneQueue.length>0&&row[1]!=null){
      const p2=seatOneQueue.shift();
      result[row[1]]=p2.id; placed.add(p2.id);
    }
  }

  // ── Phase 4: Place any still-unplaced pax in remaining empty seats ──
  const unplaced=byWeight.filter(p=>!placed.has(p.id));
  const emptySeats=seatsByArm.filter(si=>result[si]==null);
  unplaced.forEach((p,i)=>{ if(i<emptySeats.length){ result[emptySeats[i]]=p.id; }});

  return result;
}


// ── Solver (post-allocation check) ──
function runSolver(){
  const res={};
  S.dispatch.acSetup.map(s=>s.acId).filter(id=>S.aircraft[id]).forEach(acId=>{
    const a=S.aircraft[acId]; if(!a){res[acId]={err:true};return;}
    const cog=calcAcWB(acId,[]); if(!cog){res[acId]={err:true};return;}
    let r={...cog}; const over=a.fuelOver||50;

    // TOW suggestion
    if(!cog.towOk&&cog.towOver<=over){
      r.suggestKg=cog.towOver;
      r.suggestUnit=fuelUnit(acId)==='L'?(cog.towOver/AVGAS).toFixed(1)+' L':(cog.towOver/LB).toFixed(1)+' lbs';
    }
    if(cog.towOver>over) r.towFatal=true;
    if(cog.lwOver>over) r.lwFatal=true;

    // CoG fix suggestion: if CoG is aft of limit, try moving heaviest non-seat-1 pax to seat 1
    if(!cog.cogOk && cog.cog > a.cogMax && !seat1IsCoPilot(acId)){
      const sm=S.dispatch.seatMap[acId]||{};
      const seat1Free=!sm[1];
      // Find heaviest pax not already in seat 1, not in seat 1's row pair
      // Moving them forward (to seat 1) will shift CoG forward
      let bestSwap=null, bestCog=cog.cog;
      const paxIdxs=paxSeatIdxs(acId).filter(i=>i!==1);
      paxIdxs.forEach(i=>{
        const pid=sm[i]; if(!pid) return;
        const p=S.dispatch.pax.find(x=>x.id===pid); if(!p) return;
        // Simulate: move this pax to seat 1, move seat-1 pax (if any) to this seat
        const newSm={...sm};
        const prev1=sm[1];
        newSm[1]=pid;
        if(prev1) newSm[i]=prev1; else delete newSm[i];
        // Recalc CoG with this swap
        const setup=S.dispatch.acSetup.find(s=>s.acId===acId);
        const picW=setup?S.crew.find(c=>c.n===setup.pic)?.w||0:0;
        let wt=a.ew+picW, mom=a.em+picW*a.seats[0].arm;
        const fW=fuelKgForSetup(acId);
        paxSeatIdxs(acId).forEach(si=>{
          const opid=newSm[si]; if(!opid) return;
          const op=S.dispatch.pax.find(x=>x.id===opid); if(!op) return;
          const w=parseFloat(op.weight||0)+parseFloat(op.bag||0);
          wt+=w; mom+=w*(a.seats[si]?.arm??0);
        });
        wt+=fW; mom+=fW*a.fuelArm; wt-=a.gndBurn; mom-=a.gndBurn*a.fuelArm;
        const newCog=mom/wt;
        if(newCog<bestCog){
          bestCog=newCog;
          const pname=p.name||('Seat '+i);
          const prev1name=prev1?S.dispatch.pax.find(x=>x.id===prev1)?.name||'Seat 1 pax':null;
          bestSwap={fromIdx:i,toIdx:1,pname,prev1name,newCog,
            fixes:newCog>=a.cogMin&&newCog<=a.cogMax};
        }
      });
      if(bestSwap){
        r.cogSwapSuggestion=bestSwap;
        // Auto-apply if it fixes the problem (not when called from manual drag/drop)
        if(bestSwap.fixes&&S.solverAutoApply!==false){
          const sm2=S.dispatch.seatMap[acId]||{};
          const prev1=sm2[1];
          sm2[1]=sm2[bestSwap.fromIdx];
          if(prev1) sm2[bestSwap.fromIdx]=prev1; else delete sm2[bestSwap.fromIdx];
          S.dispatch.seatMap[acId]=sm2;
          // Recalc after swap
          const cog2=calcAcWB(acId,[]);
          if(cog2) r={...cog2,autoFixed:true,
            autoFixMsg:'Auto-fixed CoG: moved '+bestSwap.pname+' to Seat 1'+(bestSwap.prev1name?' (swapped with '+bestSwap.prev1name+')':'')};
        }
      }
    }

    // Forward CoG fix: if CoG too far forward (rare but possible)
    if(!cog.cogOk && cog.cog < a.cogMin){
      r.cogFwdWarning=true;
    }

    res[acId]=r;
  });
  S.solverRes=res;
}

// ── Manifest pax tab-key navigation ──
// _ffRow/_ffField: force-focus globals. Tab handler sets these then calls render().
// render() uses them to focus the right element after rebuilding the DOM.
// We never call next.focus() directly — doing so inside keydown triggers blur→render()
// synchronously, which destroys the element we just focused (browser then steals focus back).
let _ffRow=null,_ffField=null;
document.addEventListener('keydown',function(e){
  if(e.key!=='Tab')return;
  if(!document.querySelector('[data-field="name"]'))return;
  const el=e.target;
  const pf=el.dataset&&el.dataset.field;
  const pr=el.dataset&&el.dataset.row;
  if(!pf||pr===undefined||pr===null)return;
  e.preventDefault();
  const rowIdx=parseInt(pr);
  const fields=['name','group'];
  const fi=fields.indexOf(pf);
  if(fi<0)return;
  let nextRow,nextField;
  if(!e.shiftKey){
    if(fi<3){nextRow=rowIdx;nextField=fields[fi+1];}
    else{nextRow=rowIdx+1;nextField='name';}
  }else{
    if(fi>0){nextRow=rowIdx;nextField=fields[fi-1];}
    else if(rowIdx>0){nextRow=rowIdx-1;nextField='bag';}
    else return;
  }
  // Save current field value before render destroys it
  if(el.value!==undefined){
    const curField=pf,curI=parseInt(pr);
    if(S.dispatch.pax[curI]!==undefined)S.dispatch.pax[curI][curField]=el.value;
  }
  _ffRow=String(nextRow);_ffField=nextField;
  render();
  // If next row doesn't exist yet (Tab past last pax), create it
  if(!document.querySelector('[data-row="'+nextRow+'"][data-field="name"]')&&!e.shiftKey){
    addPax();
    setTimeout(function(){_ffRow=String(nextRow);_ffField='name';render();},30);
  }
});

function mergeDispatch(remote){
  if(!remote||typeof remote!=='object')return;
  if(remote._updatedBy===S.user?.id)return; // ignore our own echo
  const local=S.dispatch;
  if(remote._loadedAt&&(!local._loadedAt||remote._loadedAt>local._loadedAt)){
    S.dispatch={...remote,seatMap:{},step:local.step||1};
    S.solverRes={};
    const who=(S.users||[]).find(function(u){return u.id===remote._updatedBy;});
    const whoName=who?(who.name||who.email).split(' ')[0]:'Someone';
    toast(whoName+' loaded manifest: '+(remote.name||'untitled'),'info');
    safeRender();return;
  }

  // Merge pax by id — higher _ts wins
  const paxMap={};
  (local.pax||[]).forEach(function(p){paxMap[p.id]=p;});
  (remote.pax||[]).forEach(function(p){
    if(!paxMap[p.id]||(p._ts||0)>(paxMap[p.id]._ts||0)){paxMap[p.id]=p;}
  });
  // Remove pax deleted by the other user (not in remote, and remote is more recent overall)
  if((remote._updateTs||0)>(local._updateTs||0)){
    const remIds=new Set((remote.pax||[]).map(function(p){return p.id;}));
    Object.keys(paxMap).forEach(function(id){
      if(!remIds.has(id)&&(paxMap[id]._ts||0)<(remote._updateTs||0)){delete paxMap[id];}
    });
  }
  S.dispatch.pax=Object.values(paxMap);

  // Merge acSetup by acId — higher _ts wins
  const acMap={};
  (local.acSetup||[]).forEach(function(s){acMap[s.acId]=s;});
  (remote.acSetup||[]).forEach(function(s){
    if(!acMap[s.acId]||(s._ts||0)>(acMap[s.acId]._ts||0)){acMap[s.acId]=s;}
  });
  S.dispatch.acSetup=Object.values(acMap);

  // Top-level flight fields + seatMap: take from remote if it's more recent
  if((remote._updateTs||0)>(local._updateTs||0)){
    ['dep','dest','date','etd','etdCustom','name','seatMap','origAcMap'].forEach(function(k){
      if(remote[k]!==undefined)S.dispatch[k]=remote[k];
    });
    S.dispatch._updateTs=remote._updateTs;
  }

  const who=(S.users||[]).find(function(u){return u.id===remote._updatedBy;});
  const whoName=who?(who.name||who.email).split(' ')[0]:'Someone';
  toast(whoName+' updated the manifest','info');
  safeRender();
}

// ── Simple auth (hashed with btoa for demo — production would use Supabase Auth) ──
// SHA-256 password hashing via Web Crypto (much stronger than btoa)
async function hashPw(pw){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
// Verify a password against a stored hash (supports legacy btoa hashes for migration)
async function verifyPw(plain,stored){
  if(!plain||!stored)return false;
  // Legacy btoa hash
  if(stored===btoa(plain))return true;
  // SHA-256
  return stored===await hashPw(plain);
}

function _applyWorkspace(ws){
  if(!ws)return;
  var _render=false;
  // ── Loadsheet tabs ──
  S.lsTabs=S.lsTabs||[];
  (ws.openLsIds||[]).forEach(function(_wid){
    if(S.lsTabs.find(function(t){return t.id===_wid;}))return;
    var _ws2=(S.saved||[]).find(function(x){return x.id===_wid&&x.status!=='deleted';});
    if(_ws2){
      var _wac=(_ws2.form&&_ws2.form.ac)||'ZK-SLA';
      var _wform=dc(_ws2.form);if(!_wform.cargo)_wform.cargo={};
      var _isNew=_ws2.status==='draft';
      S.lsTabs.push({id:_ws2.id,acId:_wac,form:_wform,status:'unsigned',savedAt:_ws2.savedAt,isNew:_isNew,originalForm:_isNew?null:dc(_ws2.form)});
      _render=true;
    }
  });
  if(_render&&!S.activeTabId&&S.lsTabs.length){
    var _wt=S.lsTabs[0];
    S.activeTabId=_wt.id;S.form=_wt.form;S.lsAc=(_wt.acId||'').replace('ZK-','');S.editId=_wt.id;
    S.tab='loadsheet';S._newLsTab=false;
  }
  // ── Manifest tabs ──
  if(!S.manifestTabs)S.manifestTabs=[];
  if(!S._manifestDispatches)S._manifestDispatches={};
  (ws.openManifestTabs||[]).forEach(function(_wmt){
    if(S.manifestTabs.find(function(t){return t.id===_wmt.id;}))return;
    if(_wmt.savedId){
      // Restore a saved manifest into a new tab
      var _wm=(S.manifests||[]).find(function(m){return m.id===_wmt.savedId;});
      if(_wm){
        var _wmData=Object.assign({},bD(),_wm.data||{},{step:1});
        S.manifestTabs.push({id:_wmt.id,savedId:_wmt.savedId});
        S._manifestDispatches[_wmt.id]=JSON.parse(JSON.stringify(_wmData));
        if(!S.activeManifestTabId){S.activeManifestTabId=_wmt.id;S.dispatch=JSON.parse(JSON.stringify(_wmData));S._loadedManifestId=_wmt.savedId;}
        _render=true;
      }
    } else {
      // Blank manifest tab
      S.manifestTabs.push({id:_wmt.id,savedId:null});
      S._manifestDispatches[_wmt.id]=JSON.parse(JSON.stringify(bD()));
      if(!S.activeManifestTabId){S.activeManifestTabId=_wmt.id;S.dispatch=bD();}
      _render=true;
    }
  });
  if(_render)safeRender();
}

// safeRender: defers render if an input/select/textarea is currently focused
let _rtRenderPending=false;
let _rtRenderMaxWait=null;
function safeRender(){
  const ae=document.activeElement;
  const tag=ae&&ae.tagName;
  if(tag==='INPUT'||tag==='SELECT'||tag==='TEXTAREA'){
    _rtRenderPending=true;
    // Safety net: force render after 3s even if input stays focused
    if(!_rtRenderMaxWait)_rtRenderMaxWait=setTimeout(function(){
      _rtRenderPending=false;_rtRenderMaxWait=null;render();
    },3000);
  } else {render();}
}
// Auto-select input content on focus (type-to-overwrite behaviour)
document.addEventListener('focusin',function(e){var t=e.target;if(t&&t.tagName==='INPUT'&&typeof t.select==='function'){try{t.select();}catch(_){}}});

// Cmd+Z / Ctrl+Z global undo for loadsheet
document.addEventListener('keydown',function(e){
  if((e.metaKey||e.ctrlKey)&&e.key==='z'&&!e.shiftKey){
    if((S.tab==='loadsheet'||S.tab.startsWith('ls_'))&&S._lsFormUndoStack&&S._lsFormUndoStack.length){
      e.preventDefault();
      window.lsUndo();
    }
  }
});
// Fire deferred render when focus fully leaves all inputs
document.addEventListener('focusout',function(e){
  if(!_rtRenderPending)return;
  const next=e.relatedTarget;
  const nt=next&&next.tagName;
  if(nt!=='INPUT'&&nt!=='SELECT'&&nt!=='TEXTAREA'){
    _rtRenderPending=false;
    clearTimeout(_rtRenderMaxWait);_rtRenderMaxWait=null;
    render();
  }
});

function render(){
  const r=document.getElementById('root');
  if(!r)return;
  document.body.classList.toggle('wide-mode',!!S.wideMode);
  // Auto-detect mobile on first render
  if(typeof S._mobileInit==='undefined'){S._mobileInit=true;if(typeof S.mobileView==='undefined')S.mobileView=/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)&&window.innerWidth<800;}
  document.body.classList.toggle('mobile-view',!!S.mobileView);
  // ── Preserve focused input across re-renders ──
  const _ae=document.activeElement;
  const _aeId=_ae?.id||null;
  const _aeRow=_ae?.dataset?.row;
  const _aeField=_ae?.dataset?.field;
  const _aeSS=_ae?.selectionStart??null;
  const _aeSE=_ae?.selectionEnd??null;
  if(!S.user){
    // Show login overlay, hide app
    let lo=document.getElementById('login-overlay');
    if(!lo){
      lo=document.createElement('div');
      lo.id='login-overlay';
      document.body.appendChild(lo);

    return;
  }
  // Show loading screen (reuse login overlay so bg stays in place)
  let lo=document.getElementById('login-overlay');

    if(!lo){lo=document.createElement('div');lo.id='login-overlay';document.body.appendChild(lo);}
    lo.style.display='flex';

    lo.innerHTML='<div id="loading-overlay" style="display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center">'
      +'<img class="ts-logo-spin" src="'+_TS_LOGO+'" style="width:72px;height:72px" />'
      +'<div class="ts-loading-text">Loading...</div>'
      +'</div>';
    r.style.display='none';
    return;
  }
  // Hide login, show app
  if(lo) lo.style.display='none';
  r.style.display='';
  // Maintenance-only users: redirect to maintenance if on wrong tab
  if(S.user?.role==='maint'&&S.section!=='maintenance'){S.tab='maintenance';S.section='maintenance';}
  r.innerHTML=renderApp()+renderAccountModal()+renderToasts()+renderIOSBanner();
  if(S.tab&&S.tab.startsWith('ls_'))setTimeout(_applyLsFlash,50);
  if(S._pendingFlash&&S._pendingFlash.length){var _pf=S._pendingFlash;S._pendingFlash=[];setTimeout(function(){_triggerFlash(_pf);},50);}
  if((S.tab==='loadsheet'&&S.activeTabId)||S.tab.startsWith('ls_')){setupSig();var lf=S.form;if(lf&&lf.dep&&lf.dest)renderRouteMap('ls-map',[{from:lf.dep,to:lf.dest}]);}
  // ── Restore focus after re-render ──
  // Force-focus (set by Tab handler) takes priority over activeElement detection
  if(_ffRow!==null){
    const _re=document.querySelector('[data-row="'+_ffRow+'"][data-field="'+_ffField+'"]');
    if(_re){_re.focus();try{_re.select();}catch{}}
    _ffRow=null;_ffField=null;
  } else if(_aeRow!==undefined&&_aeField){
    const _re=document.querySelector('[data-row="'+_aeRow+'"][data-field="'+_aeField+'"]');
    if(_re){_re.focus();try{_re.setSelectionRange(_aeSS,_aeSE);}catch{}}
  } else if(_aeId&&S.tab!=='manifest'){
    const _re=document.getElementById(_aeId);
    if(_re){_re.focus();try{_re.setSelectionRange(_aeSS,_aeSE);}catch{}}
  }
}

// ── Toast/pill notification (replaces alert) ──
function toast(msg, type){
  type=type||'info';
  S.toasts=S.toasts||[];
  const id='t'+Date.now();
  S.toasts.unshift({id,msg,type,ts:Date.now()});
  S.toasts=S.toasts.slice(0,5); // max 5 toasts
  // Auto-dismiss after 5 seconds
  setTimeout(function(){
    S.toasts=(S.toasts||[]).filter(function(t){return t.id!==id;});
    const el=document.getElementById('toast-'+id);
    if(el) el.style.opacity='0';
    setTimeout(function(){safeRender();},300);
  },5000);
  render();
}
function renderToasts(){
  const toasts=S.toasts||[];

// ── Centralised audit logging ──
async function auditLog(action, detail){
  const u=S.user;
  const entry={
    time: new Date().toISOString(),
    user: u?.email||'unknown',
    name: u?.name||u?.email||'unknown',
    role: u?.role||'unknown',
    action,
    detail: typeof detail==='object'?JSON.stringify(detail):String(detail||''),
    device: navigator.userAgent.slice(0,120),
  };
  // Store locally
  S.auditLog=S.auditLog||[];
  S.auditLog.unshift(entry);
  lsSet('ts_audit_log',S.auditLog.slice(0,1000));
  // Push to Supabase ts_audit_log table
  try{
    await fetch(SB+'/rest/v1/ts_audit_log',{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SK,'Authorization':'Bearer '+SK,'Prefer':'return=minimal'},
      body:JSON.stringify({user_email:entry.user,user_name:entry.name,role:entry.role,action:entry.action,detail:entry.detail,device:entry.device,created_at:entry.time})
    });
  }catch(e){console.warn('Audit log push failed:',e);}
}

function renderLoginInner(){
  return`<div style="width:100%;max-height:100%;overflow-y:auto;display:flex;align-items:center;justify-content:center;padding:max(52px,calc(env(safe-area-inset-top) + 20px)) 20px max(40px,env(safe-area-inset-bottom))">
    <div style="width:100%;max-width:400px">
      <div style="text-align:center;margin-bottom:32px">
        <img src="${_TS_LOGO}" alt="True South Flights" style="width:240px;max-width:80%;margin-bottom:16px">
        <div style="font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.45)">Flight Management System</div>
      </div>
      <div style="background:rgba(10,15,25,.78);backdrop-filter:blur(20px);border-radius:16px;border:1px solid rgba(255,255,255,.12);padding:32px 28px;box-shadow:0 24px 60px rgba(0,0,0,.5)">
        <div id="login-err" style="display:${S.loginErr?'block':'none'};background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.4);border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:13px;color:#fca5a5">${S.loginErr||''}</div>
        <form id="login-form" action="javascript:void(0)" onsubmit="window.tryLogin();return false" autocomplete="on"><div style="margin-bottom:16px">
          <label style="display:block;font-size:11px;font-weight:600;color:rgba(255,255,255,.45);margin-bottom:6px;letter-spacing:.5px;text-transform:uppercase">Email</label>
          <div style="display:flex;align-items:center;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);border-radius:8px;overflow:hidden">
            <input id="li_e" type="text" autocomplete="email" autocapitalize="none" autocorrect="off" spellcheck="false" placeholder="yourname"
              style="flex:1;padding:11px 14px;background:transparent;border:none;color:#fff;font-size:14px;outline:none;min-width:0;max-width:calc(100% - 160px)"
              oninput="window.updateLoginSuffix()" onfocus="document.getElementById('li_e_sfx').style.display='inline';window.updateLoginSuffix()" onblur="if(!this.value)document.getElementById('li_e_sfx').style.display='none';" onkeydown="if(event.key==='Enter')document.getElementById('li_p')?.focus()">
            <span id="li_e_sfx" style="display:none;flex-shrink:0;padding:0 12px 0 0;color:rgba(255,255,255,.45);font-size:12px;white-space:nowrap;align-self:center">@truesouthflights.co.nz</span>
          </div>
        </div>

window.changePasswordFromModal=async function(){
  const m=S.admin.personModal;if(!m||!m.userId)return;
  const isOwnAccount=m.userId===S.user?.id;
  const curEl=document.getElementById('pm_curpw');
  const newEl=document.getElementById('pm_newpw');
  const confEl=document.getElementById('pm_confpw');
  const cur=curEl?curEl.value:'';
  const nw=newEl?newEl.value:'';
  const conf=confEl?confEl.value:'';
  if(isOwnAccount&&!await verifyPw(cur,S.user.passwordHash)){S.admin.pwMsg={ok:false,text:'Current password is incorrect.'};render();return;}
  if(nw.length<6){S.admin.pwMsg={ok:false,text:'Min 6 characters.'};render();return;}
  if(nw!==conf){S.admin.pwMsg={ok:false,text:'Passwords do not match.'};render();return;}
  const user=S.users.find(function(x){return x.id===m.userId;});
  const nwHash=await hashPw(nw);
  if(user)user.passwordHash=nwHash;
  if(isOwnAccount){S.user.passwordHash=nwHash;sessionStorage.setItem('ts_user',JSON.stringify(S.user));}
  lsSet('ts_users_cache',S.users);
  try{await sbU('ts_users',[{id:m.userId,password_hash:nwHash}]);}catch(e){}
  S.admin.pwMsg={ok:true,text:'Password updated.'};render();
};

window.goToMyProfile=function(){
  S.section='settings';S.tab='admin';
  S.admin=S.admin||{};
  S.admin.section='people';
  S.showAccount=false;
  const myUserId=S.user?.id;
  const myUser=S.users.find(function(x){return x.id===myUserId;});
  const myCrewName=(myUser?.linkedCrew||'').trim().toLowerCase();
  const myCrew=myCrewName?S.crew.find(function(cr){return(cr.n||'').trim().toLowerCase()===myCrewName;}):null;
  window.openPersonModal(myCrew?myCrew.id:null,myUserId||null);
};

window.changeMyPassword=async function(){
  const cur=document.getElementById('acc_cur')?.value||'';
  const nw=document.getElementById('acc_new')?.value||'';
  const conf=document.getElementById('acc_conf')?.value||'';
  const u=S.user;
  if(!await verifyPw(cur,u.passwordHash)){S.changePwMsg={ok:false,text:'Current password is incorrect.'};render();return;}
  if(nw.length<6){S.changePwMsg={ok:false,text:'New password must be at least 6 characters.'};render();return;}
  if(nw!==conf){S.changePwMsg={ok:false,text:'New passwords do not match.'};render();return;}
  // Update in S.users
  const stored=S.users.find(x=>x.id===u.id);
  const nwHash2=await hashPw(nw);
  if(stored) stored.passwordHash=nwHash2;
  u.passwordHash=nwHash2;
  sessionStorage.setItem('ts_user',JSON.stringify(u));
  lsSet('ts_users_cache',S.users);
  try{
    await sbU('ts_users',[{id:u.id,name:u.name,email:u.email,role:u.role,
      linked_crew:u.linkedCrew||'',password_hash:nwHash2,
      reset_token:null,reset_expires:null}]);
  }catch(e){}
  auditLog('password_change','User changed their own password');
  S.changePwMsg={ok:true,text:'Password updated successfully.'};
  render();
};

function _triggerFlash(ids){
  if(!ids)return;if(!Array.isArray(ids))ids=[ids];
  ids.forEach(function(id){
    var el=document.getElementById(id);
    if(el&&!el.classList.contains('ls-flash')){
      el.classList.add('ls-flash');
      setTimeout(function(){if(el)el.classList.remove('ls-flash');},2000);
    }
  });
}
function _applyLsFlash(){
  if(!S._lsFlash)return;
  var now=Date.now();
  Object.keys(S._lsFlash).forEach(function(k){
    var age=now-S._lsFlash[k];
    if(age>2200){delete S._lsFlash[k];return;}
    var elId=k==='fuel'?'lsf-fuel':(k==='route'?'lsf-seats':'lsf-seats');
    var el=document.getElementById(elId);
    if(el&&!el.classList.contains('ls-flash')){
      el.classList.add('ls-flash');
      var rem=Math.max(100,2000-age);
      setTimeout(function(){if(el)el.classList.remove('ls-flash');},rem);
    }
    delete S._lsFlash[k];
  });
  _triggerFlash('flash-loadsheet');
}

// ── MANIFEST STEP 2: Dual-aircraft seat map ──

function cogPillClass(cog, cogMin, cogMax){
  if(!cog||!cogMax) return 'pill-green';
  if(cog>cogMax||cog<cogMin) return 'pill-red';
  // Caravan: cogMax ~204.4, warn from 203 (1.4" away)
  // Airvan: cogMax ~64, warn from 63 (1" away)
  const range=cogMax-cogMin;
  const warnDist=range<100?1.0:1.4; // 1" airvan, 1.4" caravan
  const warnMin=cogMin+warnDist; const warnMax=cogMax-warnDist;
  const orangeDist=warnDist*0.5;
  const orangeMax=cogMax-orangeDist; const orangeMin=cogMin+orangeDist;
  if(cog>=orangeMax||cog<=orangeMin) return 'pill-orange';
  if(cog>=warnMax||cog<=warnMin) return 'pill-warn';
  return 'pill-green';
}
window.toggleLockAc=function(acId){
  S.lockedAcs=S.lockedAcs||[];
  const i=S.lockedAcs.indexOf(acId);
  if(i>=0) S.lockedAcs.splice(i,1);
  else S.lockedAcs.push(acId);
  autoSaveDispatch();render();
};

window.reAllocate=function(){
  const d=S.dispatch;
  const locked=S.lockedAcs||[];
  if(locked.length===0){
    // Full re-allocation: clear all seats first, then auto-allocate
    d.seatMap={};d.origAcMap={};
    autoAllocate();
    return;
  }
  // Partial re-allocation: keep locked aircraft seats, clear unlocked, then fill
  const lockedPaxIds=new Set();
  locked.forEach(function(id){
    Object.values(d.seatMap[id]||{}).forEach(function(pid){lockedPaxIds.add(pid);});
  });
  // Clear only the unlocked aircraft seats
  const acs=d.acSetup.map(function(s){return s._seatmapKey||s.acId;});
  acs.forEach(function(id){
    if(!locked.includes(id))delete d.seatMap[id];
  });
  // Temporarily pin locked pax so autoAllocate leaves them alone
  const origPins={};
  d.pax.forEach(function(p){
    origPins[p.id]=p.pinAc;
    if(lockedPaxIds.has(p.id)){
      locked.forEach(function(id){
        if(Object.values(d.seatMap[id]||{}).includes(p.id))p.pinAc=id;
      });
    } else {
      p.pinAc=null;
    }
  });
  autoAllocate();
  d.pax.forEach(function(p){p.pinAc=origPins[p.id];});
};

window.applySwapFix=function(acId,fromIdx,toIdx){
  const sm=S.dispatch.seatMap[acId]||{};
  const fromPax=sm[fromIdx];
  const toPax=sm[toIdx];
  if(fromPax) sm[toIdx]=fromPax; else delete sm[toIdx];
  if(toPax) sm[fromIdx]=toPax; else delete sm[fromIdx];
  S.dispatch.seatMap[acId]=sm;
  runSolver();
  S.appMsg={type:'ok',text:'Swap applied — check CoG is now within limits'};
  render();
};

  const d=S.dispatch;

  // Find open loadsheet tabs not yet in the seatmap
  const _lsTabs=S.lsTabs||[];
  const _inSeatmap=new Set((setups).map(s=>s.acId));
  const _notInSeatmap=_lsTabs.filter(t=>t.form&&t.form.ac&&!_inSeatmap.has(t.form.ac));
  const _lsBanner=_notInSeatmap.length?`<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:#0c1a3a;border:1px solid #1e3a5f;border-radius:8px;margin-bottom:12px;flex-wrap:wrap">
    <span style="font-size:13px;font-weight:600;color:#93c5fd;flex:1">📋 ${_notInSeatmap.length} open loadsheet${_notInSeatmap.length!==1?'s':''} not yet in seatmap: ${_notInSeatmap.map(t=>t.form.ac).join(', ')}</span>
    <button onclick="window.pushAllLsToSeatmap()" style="padding:5px 12px;border-radius:6px;border:none;background:#3b82f6;color:#fff;font-size:12px;font-weight:700;cursor:pointer">Pull all into Seatmap</button>
  </div>`:'';
  if(!setups.length){
    // No aircraft in seatmap — if we have open loadsheets, show pull prompt; otherwise go to manifest
    if(_notInSeatmap.length) return _lsBanner+`<div class="card" style="text-align:center;padding:40px;color:var(--text3)">Click "Pull all into Seatmap" above to get started, or <button class="btn btn-ghost" style="font-size:13px" onclick="S.opsTab='manifest';render()">go to Manifest</button> to set up aircraft.</div>`;
    S.tab='manifest';render();return'';
  }

  const solverHTML=setups.map(function(setup){
    const id=setup.acId;const smKey=setup._seatmapKey||id;
    const sr=S.solverRes[smKey];if(!sr||sr.err)return'';
    let msgs=[];
    if(sr.towFatal)msgs.push('<div class="solver-box solver-err">&#x26d4; <strong>'+id+' TOW '+sr.tow?.toFixed(1)+'kg &mdash; '+sr.towOver?.toFixed(1)+'kg over MTOW ('+sr.mtow+'kg)</strong><br>Cannot be resolved with fuel alone. Remove passengers.</div>');
    else if(!sr.towOk&&sr.suggestKg)msgs.push('<div class="solver-box solver-warn">&#x26a0; <strong>'+id+' TOW '+sr.tow?.toFixed(1)+'kg &mdash; '+sr.towOver?.toFixed(1)+'kg over MTOW</strong><br>Reduce fuel by <strong>'+sr.suggestKg.toFixed(1)+'kg ('+sr.suggestUnit+')</strong>.</div>');
    if(!sr.cogOk){
      let cogMsg='&#x26d4; <strong>'+id+' C of G '+sr.cog?.toFixed(2)+'" '+(sr.cog>sr.cogMax?'AFT':'FWD')+' of limits ('+sr.cogMin+'&ndash;'+sr.cogMax+'")</strong>';
      if(sr.cogSwapSuggestion){const sw=sr.cogSwapSuggestion;cogMsg+='<br>&#x1f4a1; Suggested fix: move <strong>'+sw.pname+'</strong> to Seat 1'+(sw.prev1name?' (swap with '+sw.prev1name+')':'')+' &rarr; projected CoG '+sw.newCog.toFixed(2)+'"'+(sw.fixes?' &#x2713; legal':'');if(sw.fixes)cogMsg+='&nbsp;<button onclick="window.applySwapFix(\''+smKey+'\','+sw.fromIdx+',1)" style="margin-left:8px;padding:2px 8px;background:var(--ok-bg);border:1px solid var(--ok-border);border-radius:4px;font-size:11px;cursor:pointer;color:var(--ok-text)">Apply Fix</button>';}
      else if(sr.cog>sr.cogMax)cogMsg+='<br>Move the heaviest non-front passenger to Seat 1 to shift CoG forward';
      else cogMsg+='<br>Move a heavy passenger aft to shift CoG rearward';
      msgs.push('<div class="solver-box solver-err">'+cogMsg+'</div>');
    }
    return msgs.join('');
  }).join('');

  const groups=[...new Set((d.pax||[]).map(p=>p.group).filter(g=>g?.trim()))];

  // Unassigned pax pool
  const allAssigned=new Set(Object.values(d.seatMap||{}).flatMap(sm=>Object.values(sm)));
  const unassigned=(d.pax||[]).filter(p=>!allAssigned.has(p.id));

  const cabinsHTML=setups.map(function(setup){
    const id=setup.acId;const smKey=setup._seatmapKey||id;
    const dispSuffix=setup._displaySuffix?' '+setup._displaySuffix:'';
    const a=S.aircraft[id];const col=AC_COL[id]||'#1e6b8c';
    const sr=S.solverRes[smKey];
    const paxCount=paxSeatIdxs(id).filter(i=>(d.seatMap[smKey]||{})[i]).length;
    const paxTotal=paxSeatIdxs(id).length;
    const _ok=sr?.towOk&&sr?.lwOk&&sr?.cogOk;const _warn=sr&&!_ok&&!sr?.towFatal&&!sr?.lwFatal;
    return`<div style="margin-bottom:16px;width:fit-content">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
        <div style="width:10px;height:10px;border-radius:50%;background:${col};flex-shrink:0"></div>
        <span style="font-weight:700;font-size:13px">${(a?.name||id)+dispSuffix}</span>
        <button onclick="window.removeAcFromSeatmap('${smKey}')" style="margin-left:auto;padding:2px 8px;border-radius:6px;border:1px solid rgba(239,68,68,.4);background:rgba(239,68,68,.1);color:#ef4444;font-size:11px;cursor:pointer" title="Remove from seatmap">&#x2715; Remove</button>
      </div>
      ${sr?`<div style="display:flex;gap:6px;justify-content:center;margin-bottom:4px;flex-wrap:wrap">
        <span class="pill ${sr.towOk?'pill-green':sr.towFatal?'pill-red':'pill-warn'}">${sr.tow?.toFixed(0)}/${sr.mtow}kg</span>
        <span class="pill ${cogPillClass(sr.cog,sr.cogMin,sr.cogMax)}">CoG ${sr.cog?.toFixed(2)}"</span>
      </div>`:''}
      <div style="display:flex;justify-content:center;margin-bottom:8px">
        <span class="pill pill-blue">${paxCount}/${paxTotal} pax</span>
      </div>
      <div style="display:inline-flex;flex-direction:column" ondragover="event.preventDefault()" ondrop="dropOnPool(event,'${smKey}')">
        ${renderCabinSVG(id,true,null,undefined,undefined,smKey)}
        <button onclick="window.createLsTab('${id}')" style="margin-top:8px;padding:9px;border-radius:8px;border:none;background:${_ok?'linear-gradient(135deg,#166534,#15803d)':_warn?'linear-gradient(135deg,#78350f,#92400e)':'#7f1d1d'};color:#fff;font-size:13px;font-weight:700;cursor:pointer;align-self:stretch">
          Create Loadsheet ${_ok?'&#x2713;':_warn?'&#x26a0;':'&#x26d4;'}
        </button>
      </div>
    </div>`;
  }).join('');

  const _hasSel=!!S.selectedPax;
  const poolHTML=`<div class="card" style="padding:10px 12px;margin-bottom:12px;${_hasSel&&!unassigned.length?'border-color:var(--acc);box-shadow:0 0 0 1px var(--acc)':''}" ondragover="event.preventDefault()" ondrop="dropOnPool(event)" onclick="window.tapPool(event)">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;flex:1">Unassigned${unassigned.length?' ('+unassigned.length+')':''}</div>
      ${S._unassignedUndo?`<button style="font-size:11px;padding:2px 8px;border-radius:12px;border:1px solid #f59e0b;background:rgba(245,158,11,.12);color:#f59e0b;cursor:pointer;font-weight:700" onclick="event.stopPropagation();window.undoClearUnassigned()">↩ Undo</button>`:''}
      ${unassigned.length?`<button style="font-size:11px;padding:2px 8px;border-radius:12px;border:1px solid rgba(239,68,68,.4);background:transparent;color:#ef4444;cursor:pointer" onclick="event.stopPropagation();if(confirm('Remove all unassigned passengers?'))window.clearUnassigned()">Clear All</button>`:''}
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;min-height:54px;align-items:flex-start">
      ${unassigned.length?unassigned.map(p=>{
        const gc=p.group?.trim()?groupColor(p.group.trim()):null;
        const isSel=S.selectedPax===p.id;
        const wt=parseFloat(p.weight||0)+parseFloat(p.bag||0);
        const borderCol=p._pushedFrom?(AC_COL[p._pushedFrom]||gc||'#64748b'):gc||'#64748b';
        const cardStyle=isSel?'background:rgba(255,255,255,.97);border:2px solid #ef4444;box-shadow:0 0 0 3px rgba(239,68,68,.35),0 2px 10px rgba(0,0,0,.25)':`background:rgba(255,255,255,.93);border-left:4px solid ${borderCol}`;
        return`<div class="seat filled" style="${cardStyle};flex-shrink:0" onclick="event.stopPropagation();tapPax('${p.id}')" draggable="true" ondragstart="startDrag(event,'${p.id}','pool',null)" ondragover="event.preventDefault();event.stopPropagation()" ondrop="event.stopPropagation();window.dropOnPoolPax('${p.id}',event)">
          ${gc?`<div class="seat-dot" style="background:${gc}"></div>`:''}
          ${p.paymentReq?'<div style="position:absolute;top:3px;left:3px;font-size:7px;font-weight:900;background:rgba(239,68,68,.3);color:#ef4444;border-radius:3px;padding:0 2px;line-height:1.4">$</div>':''}
          ${p.type==='child'?'<div style="position:absolute;bottom:3px;right:3px;font-size:8px;font-weight:900;background:rgba(251,146,60,.5);color:#c2500a;border-radius:3px;padding:0 3px;line-height:1.4;border:1px solid rgba(0,0,0,.4)">C</div>':''}
          ${p.infantName?'<div style="position:absolute;bottom:3px;right:3px;font-size:8px;font-weight:900;background:rgba(236,72,153,.5);color:#9d1768;border-radius:3px;padding:0 3px;line-height:1.4;border:1px solid rgba(0,0,0,.4)">i</div>':''}
          <div class="seat-name" style="color:#1e293b;font-weight:700">${p.name?p.name.split(' ')[0]:'?'}</div>
          <div class="seat-wt" style="color:#334155">${wt>0?wt+'kg':''}</div>
        </div>`;
      }).join(''):`<div style="font-size:12px;color:var(--text3);font-style:italic">${_hasSel?'Tap here or drop seat card here to unallocate':'—'}</div>`}
    </div>
  </div>`;

  const hasLsTabs=S.lsTabs&&S.lsTabs.length>0;

  return`
  ${_lsBanner}
  ${solverHTML?`<div style="margin-bottom:12px">${solverHTML}</div>`:''}
  ${poolHTML}
  <div class="card" style="padding:12px">
    <div style="display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start;overflow-x:auto;-webkit-overflow-scrolling:touch">
      ${cabinsHTML}
    </div>
  </div>
  ${groups.length?`<div class="card" style="padding:10px 12px">
    <div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px">Groups</div>
    <div style="display:flex;flex-wrap:wrap;gap:10px">
      ${groups.map(g=>`<div style="display:flex;align-items:center;gap:5px"><div style="width:9px;height:9px;border-radius:50%;background:${groupColor(g)}"></div><span style="font-size:12px">${g}</span></div>`).join('')}
    </div>
  </div>`:''}
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px">
    <button class="btn btn-ghost" onclick="S.tab='manifest';window.scrollTo(0,0);render()">&#x2190; Back to Manifest</button>
    ${hasLsTabs?`<button class="btn btn-primary" onclick="window.pushAllLsToSeatmap()" style="flex:1">&#x2191; Merge All Loadsheets</button>`:''}
    <button class="btn btn-ghost" onclick="window.clearSeatmap()" style="border-color:rgba(239,68,68,.4);color:#ef4444">&#x2715; Clear Seats</button>
  </div>`;
}

window.inlineEditPaxField=function(oi,field,el){

  var inp=document.createElement('input');
  inp.type='number';inp.inputMode='decimal';inp.value=cur;

  inp.onblur=function(){setPaxField(oi,field,this.value.trim());};
  inp.onkeydown=function(e){if(e.key==='Enter'||e.key==='Escape')this.blur();};
  el.replaceWith(inp);inp.focus();inp.select();
};

window.saveManifestTabName=function(name,id){

function _fmtLsDate(iso){
  if(!iso) return '-';
  var d=new Date(iso+'T00:00:00');
  return ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][d.getDay()]+' '+d.getDate()+' '+['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()]+' '+String(d.getFullYear()).slice(-2);
}

// ── Large interactive seat grid for loadsheet ──
function renderLsSeatGrid(f,a){
  if(!a||!a.seats)return'';
  var layout=acLayout(f.ac);
  var _isCpCrew=!!f.coPilot;
  var isMob=window.innerWidth<=600;
  var sW=isMob?68:86;
  var sH=isMob?62:76;
  var isGa8=a.layout==='ga8';
  var isPod=!!(a.cargo&&a.cargo.length>1&&a.cargo[0]&&a.cargo[0].lbl&&a.cargo[0].lbl.startsWith('Pod'));
  // Build the seat rows column
  var _lsMode=S._lsSeatMode||'edit';

  var seatsCol='<div style="display:flex;flex-direction:column;align-items:'+(isMob?'flex-start':'center')+';gap:8px;padding:4px 0">';
  layout.forEach(function(row){
    if(row==='spacer'){seatsCol+='<div style="height:6px"></div>';return;}
    var _rowWt=0;
    seatsCol+='<div style="display:flex;gap:8px;align-items:center">';
    row.forEach(function(cell){
      var idx=cell.i;
      var isPIC=idx===0;
      var isCoPilot=idx===1&&_isCpCrew;
      var nm=f.names[idx]||'';
      var wt=f.seats[idx]||'';
      var bg=f.bags[idx]||'';
      var grp=(!isPIC&&!isCoPilot&&f.paxGroups)?f.paxGroups[idx]||'':'';
      var gc=grp?groupColor(grp):null;
      var paxType=(!isPIC&&!isCoPilot&&f.paxType)?f.paxType[idx]||'A':'A';
      var hasInfant=!!(f.infantNames&&f.infantNames[idx]);
      var payReq=!!(f.paxPaymentReq&&f.paxPaymentReq[idx]);
      // Full name display
      var displayNm=nm?nm.trim():'';
      if(isPIC){displayNm=(f.names[0]||f.pic||'').trim();}
      else if(isCoPilot){displayNm=(f.coPilot||'').trim();}
      var isOccupied=!!nm||parseFloat(wt)>0;
      var isSelSeat=S._selFormSeat===idx;
      var isDropTarget=!isPIC&&!isCoPilot&&(S._selFormSeat!=null||S._selUnalloc!=null)&&!isSelSeat;
      var bgCol=isSelSeat?'rgba(245,158,11,.45)':isPIC?'rgba(59,130,246,.18)':isCoPilot?'rgba(100,116,139,.12)':
        isOccupied?(gc?gc+'30':'rgba(124,58,237,.14)'):(isDropTarget?'rgba(124,58,237,.08)':'var(--card2)');
      var borderCol=isSelSeat?'#f59e0b':isPIC?'#3b82f6':isCoPilot?'#64748b':
        isOccupied?(gc||'var(--accent)'):(isDropTarget?'var(--accent)':'var(--border2)');
      var nameCol=gc?gc:(isPIC?'#93c5fd':isCoPilot?'#94a3b8':'var(--text1)');
      var clickable=!isCoPilot;
      var _clickFn=isPIC?'window.lsPicChangePopup()':clickable?(_lsMode==='move'?'window.tapFormSeat('+idx+',\''+f.ac+'\',event)':'window.lsSeatEditPopup('+idx+')'):''
;      var _dragSrc=(_lsMode==='move'&&isOccupied&&!isPIC&&!isCoPilot)?' draggable="true" ondragstart="window.lsSeatDragStart('+idx+',event)"':'';
      var _dropTgt=(!isPIC&&!isCoPilot)?' ondragover="event.preventDefault();this.style.outline=\'2px solid #22c55e\'" ondragleave="this.style.outline=\'\'" ondrop="window.lsDropOnSeat('+idx+',event);this.style.outline=\'\'"':'';
      var _dragAttrs=_dragSrc+_dropTgt;
      seatsCol+='<div onclick="'+_clickFn+'"'+_dragAttrs+' style="'
        +'width:'+sW+'px;height:'+sH+'px;border-radius:10px;border:2px solid '+borderCol+';'
        +'background:'+bgCol+';cursor:'+(_lsMode==='move'&&isOccupied&&!isPIC&&!isCoPilot?'grab':clickable?'pointer':'default')+';'
        +'display:flex;flex-direction:column;align-items:center;justify-content:center;'
        +'position:relative;padding:3px 5px;text-align:center;flex-shrink:0;'
        +'transition:box-shadow .12s'
        +'"'+(clickable?' onmouseover="this.style.boxShadow=\'0 0 0 2px var(--acc)\'" onmouseout="this.style.boxShadow=\'\'"':'')+'  >';
      seatsCol+='<div style="position:absolute;top:3px;left:4px;font-size:9px;font-weight:700;color:'
        +(isPIC?'#3b82f6':isCoPilot?'#64748b':'var(--text3)')+';line-height:1">'
        +(isPIC?'PIC':isCoPilot?'CP':cell.lbl)+'</div>';
      if(displayNm){
        seatsCol+='<div style="font-size:'+(isMob?'10':'12')+'px;font-weight:800;color:'+nameCol+';'
          +'line-height:1.1;max-width:'+(sW-10)+'px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;'
          +'margin-top:'+(isPIC||isCoPilot?'2':'6')+'px">'+displayNm.toUpperCase()+'</div>';
      } else if(!isPIC&&!isCoPilot){
        seatsCol+='<div style="font-size:11px;color:var(--border2);margin-top:8px">+</div>';
      }
      if(isOccupied&&!isPIC&&!isCoPilot&&parseFloat(wt)>0){
        _rowWt+=parseFloat(wt)||0;_rowWt+=parseFloat(bg)||0;
        seatsCol+='<div style="font-size:'+(isMob?'8':'9')+'px;color:'+(gc?gc:'var(--text3)')+';margin-top:2px;opacity:.9">'+wt+'kg'+(parseFloat(bg)>0?' +🎒':'')+'</div>';
      }
      if(!isPIC&&!isCoPilot&&isOccupied&&paxType==='C'){
        seatsCol+='<div style="position:absolute;bottom:3px;right:3px;font-size:7px;font-weight:900;background:rgba(251,146,60,.7);color:#7c2d12;border-radius:3px;padding:0 3px;line-height:1.6">C</div>';
      }
      if(hasInfant){
        seatsCol+='<div style="position:absolute;bottom:3px;right:3px;font-size:7px;font-weight:900;background:rgba(236,72,153,.7);color:#831843;border-radius:3px;padding:0 3px;line-height:1.6">i</div>';
      } else if(!isPIC&&paxType==='C'){
        // C badge already rendered above; only show $ if no child badge
      }
      if(!hasInfant&&payReq&&!isPIC){
        seatsCol+='<div style="position:absolute;top:2px;right:3px;font-size:7px;font-weight:900;background:rgba(239,68,68,.6);color:#fff;border-radius:3px;padding:0 3px;line-height:1.6">$</div>';
      }
      seatsCol+='</div>';
    });
    seatsCol+='</div>';
    if(_rowWt>0)seatsCol+='<div style="font-size:10px;font-weight:700;color:var(--text3);margin-left:6px;white-space:nowrap">'+Math.round(_rowWt)+'<span style="font-size:8px">kg</span></div>';
  });
  seatsCol+='</div>';
  return seatsCol;
}

// ── Seat editor popup ──
window.lsSeatEditPopup=function(idx){
  var f=S.form;if(!f)return;

    +'<div style="margin-bottom:6px">'
    +'<div style="display:flex;gap:6px;align-items:center;margin-bottom:6px">'

    +'<button id="lsSpAddInfant" title="Add infant" style="padding:6px 10px;border-radius:8px;border:1.5px solid rgba(236,72,153,.5);background:rgba(236,72,153,.1);color:#ec4899;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap">+ 👶</button>'
    +'</div>'
    +'<div id="lsSpPills" style="display:flex;flex-wrap:wrap;gap:4px;min-height:0">'+_pillsHTML(_initVal)+'</div>'
