function renderMaintMonthly(){
  const hist=S.maintenance?.hist||[];
  if(!hist.length) return '<div style="color:var(--text3);font-size:12px">No data</div>';
  const acs=['ZK-SLA','ZK-SLB','ZK-SLD','ZK-SLQ','ZK-SDB'];

  // Group by month
  const byMonth={};
  hist.forEach(function(e){
    const m=e.date.slice(0,7);
    if(!byMonth[m]) byMonth[m]={};
    acs.forEach(function(ac){if(e[ac]!=null) byMonth[m][ac]=(byMonth[m][ac]||[]).concat(e[ac]);});
  });

  const months=Object.keys(byMonth).sort().reverse().slice(0,12);
  if(!months.length) return '';

  const header='<div style="display:grid;grid-template-columns:80px repeat(5,1fr) 50px;gap:4px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;margin-bottom:4px;padding:0 4px">'+
    '<div>Month</div>'+acs.map(ac=>'<div style="text-align:right;color:'+(AC_COL[ac]||'#888')+'">'+ac.replace('ZK-','')+'</div>').join('')+'<div style="text-align:right;color:var(--text2);font-weight:700">Fleet</div></div>';

  // Build a sorted list of all months for cross-month boundary lookup
  const allMonths=Object.keys(byMonth).sort();
  const months2=allMonths.slice().reverse().slice(0,12);

  function monthLabel(m){
    const mn=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const parts=m.split('-');return mn[parseInt(parts[1])-1]+' '+parts[0].slice(2);
  }

  // For each AC, get the last known TTIS value up to end of a given month
  function lastKnownBefore(ac, beforeMonth){
    // Find the last entry before this month
    const cutoff=beforeMonth+'-32'; // all dates before next month
    const entries=hist.filter(function(e){return e.date<cutoff&&e[ac]!=null;});
    return entries.length?entries[entries.length-1][ac]:null;
  }

  const rows=months2.map(function(m){
    const md=byMonth[m];
    // Find prev month for cross-boundary start
    const mIdx=allMonths.indexOf(m);
    const prevMonth=mIdx>0?allMonths[mIdx-1]:null;

    const cols=acs.map(function(ac){
      const vals=(md[ac]||[]).sort(function(a,b){return a-b;});
      const maxVal=vals.length?vals[vals.length-1]:null;
      // Start = last known value from previous month, or first val this month
      let startVal=prevMonth?lastKnownBefore(ac, prevMonth):null;
      if(startVal==null) startVal=vals.length?vals[0]:null;
      if(maxVal==null||startVal==null) return '<div style="text-align:right;color:var(--text3)">—</div>';
      const hrs=Math.round((maxVal-startVal)*10)/10;
      if(hrs<=0) return '<div style="text-align:right;color:var(--text3)">—</div>';
      return '<div style="text-align:right;font-weight:600;font-size:12px">'+hrs+'</div>';
    }).join('');

    const fleetTotal=acs.reduce(function(s,ac){
      const vals=(md[ac]||[]).sort(function(a,b){return a-b;});
      const maxVal=vals.length?vals[vals.length-1]:null;
      const prevMonth2=mIdx>0?allMonths[mIdx-1]:null;
      let startVal=prevMonth2?lastKnownBefore(ac,prevMonth2):null;
      if(startVal==null) startVal=vals.length?vals[0]:null;
      if(maxVal==null||startVal==null) return s;
      const hrs=Math.round((maxVal-startVal)*10)/10;
      return s+(hrs>0?hrs:0);
    },0);

    return'<div style="display:grid;grid-template-columns:80px repeat(5,1fr) 50px;gap:4px;padding:4px;border-radius:4px;background:var(--card2);margin-bottom:2px">'+
      '<div style="font-size:11px;color:var(--text3);font-weight:600">'+monthLabel(m)+'</div>'+cols+
      '<div style="text-align:right;font-weight:700;font-size:12px;color:var(--ok-text)">'+(fleetTotal>0?fleetTotal.toFixed(1):'—')+'</div></div>';
  }).join('');

  return header+rows;
}

        <th style="padding:6px 6px;text-align:right;font-size:11px;color:#f59e0b">Oil</th>

function renderMaintEstimator(){
  const m=S.maintenance||{};
  const hist=m.hist||[];
  const acs=['ZK-SLA','ZK-SLB','ZK-SLD','ZK-SLQ','ZK-SDB'];
  const now=new Date();

  const rows=acs.map(function(ac){
    const latest=maintGetLatest(ac);
    const nc=m.nextCheck?.[ac];
    const toRun=nc&&latest!=null?nc-latest:null;

    // Compute average daily hours from ALL available history for this aircraft
    // Use full span from first to most recent entry
    const acHist=hist.filter(function(e){return e[ac]!=null;}).sort(function(a,b){return a.date.localeCompare(b.date);});
    let dailyAvg=null;
    if(acHist.length>=2){
      const firstDate=new Date(acHist[0].date+'T00:00:00');
      const lastDate=new Date(acHist[acHist.length-1].date+'T00:00:00');
      const spanDays=(lastDate-firstDate)/(24*60*60*1000);
      const totalHrs=acHist[acHist.length-1][ac]-acHist[0][ac];
      if(spanDays>0&&totalHrs>0) dailyAvg=totalHrs/spanDays;
    }
    // Fallback: recent 90-day rate if not enough full history
    if(!dailyAvg&&acHist.length>=2){
      const ninetyAgo=new Date(now-90*24*60*60*1000);
      const recent=acHist.filter(function(e){return new Date(e.date+'T00:00:00')>=ninetyAgo;});
      if(recent.length>=2){
        const span=(new Date(recent[recent.length-1].date)-new Date(recent[0].date))/(24*60*60*1000);
        const hrs=recent[recent.length-1][ac]-recent[0][ac];
        if(span>0&&hrs>0) dailyAvg=hrs/span;
      }
    }

    const hrsPerYear=dailyAvg?Math.round(dailyAvg*365):null;
    const daysToCheck=dailyAvg&&toRun?Math.round(toRun/dailyAvg):null;
    const checkDate=daysToCheck?new Date(now.getTime()+daysToCheck*24*60*60*1000).toISOString().slice(0,10):null;
    const inExtension=nc&&latest!=null&&latest>nc;

    const etr=m.engineToRun?.[ac];
    const ptr=m.propToRun?.[ac];
    const daysToEngine=dailyAvg&&etr?Math.round(etr/dailyAvg):null;
    const engineDate=daysToEngine?new Date(now.getTime()+daysToEngine*24*60*60*1000).toISOString().slice(0,10):null;
    const daysToProp=dailyAvg&&ptr?Math.round(ptr/dailyAvg):null;
    const propDate=daysToProp?new Date(now.getTime()+daysToProp*24*60*60*1000).toISOString().slice(0,10):null;

    function fmtEst(date,days){
      if(!date) return'<span style="color:var(--text3)">—</span>';
      const yr=Math.round(days/365*10)/10;
      return`<span style="font-weight:700">${date.slice(0,7)}</span><span style="font-size:10px;color:var(--text3);margin-left:4px">(${yr}yr)</span>`;
    }

    const col=AC_COL[ac]||'#888';
    return`<div class="card" style="border-top:3px solid ${col}">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
        <div style="font-weight:700;font-size:14px;color:${col}">${acDisp(ac)}</div>
        ${inExtension?'<span style="background:#ef444420;border:1px solid #ef4444;color:#ef4444;font-size:10px;font-weight:800;padding:2px 7px;border-radius:4px">IN EXTENSION</span>':''}
        ${hrsPerYear?`<span style="font-size:11px;color:var(--text3)">${hrsPerYear} hrs/yr avg</span>`:''}
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px">
        <div><div style="font-size:10px;color:var(--text3);text-transform:uppercase;margin-bottom:3px">Next ${m.checkType?.[ac]||'100hr'} Check</div>
          ${fmtEst(checkDate,daysToCheck)}
          ${toRun!=null?`<div style="font-size:10px;color:var(--text3)">${toRun.toFixed(1)} hrs to run</div>`:''}
        </div>
        <div><div style="font-size:10px;color:var(--text3);text-transform:uppercase;margin-bottom:3px">Engine OH</div>
          ${fmtEst(engineDate,daysToEngine)}
          ${etr!=null?`<div style="font-size:10px;color:var(--text3)">${etr.toFixed(0)} hrs to run</div>`:''}
        </div>
        <div><div style="font-size:10px;color:var(--text3);text-transform:uppercase;margin-bottom:3px">Prop OH</div>
          ${fmtEst(propDate,daysToProp)}
          ${ptr!=null?`<div style="font-size:10px;color:var(--text3)">${ptr.toFixed(0)} hrs to run</div>`:''}
        </div>
      </div>
    </div>`;
  }).join('');

  return`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px">${rows}</div>
  <div style="font-size:11px;color:var(--text3);padding:8px 0">Estimates use average hrs/yr from all available history. Actual dates vary with utilisation.</div>`;
}

function renderMaintSearch(){
  const sf=S.maintSearch||{};
  const hist=S.maintenance?.hist||[];
  const oil=S.maintenance?.oil||[];
  const acs=['ZK-SLA','ZK-SLB','ZK-SLD','ZK-SLQ','ZK-SDB'];

  const form=`<div class="card" style="margin-bottom:12px">
    <div class="st">Search Maintenance Data</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-bottom:10px">
      <div><label style="font-size:11px;color:var(--text3)">Aircraft</label>
        <select class="fi" onchange="S.maintSearch=S.maintSearch||{};S.maintSearch.ac=this.value;safeRender()" style="font-size:12px">
          <option value="">All Aircraft</option>
          ${acs.map(ac=>`<option ${sf.ac===ac?'selected':''}>${ac}</option>`).join('')}
        </select></div>
      <div><label style="font-size:11px;color:var(--text3)">From Date</label>
        <input type="date" class="fi" value="${sf.from||''}" onchange="S.maintSearch=S.maintSearch||{};S.maintSearch.from=this.value;safeRender()" style="font-size:12px"></div>
      <div><label style="font-size:11px;color:var(--text3)">To Date</label>
        <input type="date" class="fi" value="${sf.to||''}" onchange="S.maintSearch=S.maintSearch||{};S.maintSearch.to=this.value;safeRender()" style="font-size:12px"></div>
      <div><label style="font-size:11px;color:var(--text3)">Data Type</label>
        <select class="fi" onchange="S.maintSearch=S.maintSearch||{};S.maintSearch.type=this.value;safeRender()" style="font-size:12px">
          <option value="hours" ${sf.type==='hours'?'selected':''}>Flight Hours</option>
          <option value="oil" ${sf.type==='oil'?'selected':''}>Oil Usage</option>
          <option value="starts" ${sf.type==='starts'?'selected':''}>Engine Starts</option>
          <option value="landings" ${sf.type==='landings'?'selected':''}>Landings</option>
        </select></div>
    </div>
  </div>`;

  const type=sf.type||'hours';
  const data=type==='oil'?oil:hist;
  // For oil: generate every date in range so gaps show as —
  let filtered;
  if(type==='oil'){
    const today=new Date().toISOString().slice(0,10);
    const rangeFrom=sf.from||(data.length?data[0].date:today);
    const rangeTo=sf.to||today;
    const allDates=[];
    const d=new Date(rangeFrom+'T00:00:00');
    const end=new Date(rangeTo+'T00:00:00');
    while(d<=end){const ds=d.toISOString().slice(0,10);allDates.push(ds);d.setDate(d.getDate()+1);}
    const oilByDate={};
    data.forEach(function(e){oilByDate[e.date]=e;});
    filtered=allDates.map(function(ds){return oilByDate[ds]||{date:ds};});
  } else {
    filtered=data.filter(function(e){
      if(sf.from&&e.date<sf.from) return false;
      if(sf.to&&e.date>sf.to) return false;
      return true;
    });
    // For starts/landings, only show rows that have at least one value
    if(type==='starts'||type==='landings'){
      const key=type==='starts'?'_starts':'_landings';
      const acCols2=sf.ac?[sf.ac]:acs;
      filtered=filtered.filter(function(e){return acCols2.some(function(ac){return e[ac+key]!=null;});});
    }
  }

  const acCols=sf.ac?[sf.ac]:acs;

  if(!filtered.length) return form+'<div class="card" style="color:var(--text3);font-size:12px">No results for the selected filters.</div>';

  // Summary
  const summary=acCols.map(function(ac){
    if(type==='oil'){
      const acData=filtered.filter(function(e){return e[ac]!=null;});
      if(acData.length<1) return null;
      const total=acData.reduce(function(s,e){return s+(e[ac]||0);},0);
      return{ac,total:Math.round(total*10)/10,unit:'quarts added'};
    }
    if(type==='starts'){
      const acData=filtered.filter(function(e){return e[ac+'_starts']!=null;});
      if(acData.length<1) return null;
      const total=acData.reduce(function(s,e){return s+(e[ac+'_starts']||0);},0);
      return{ac,total,unit:'starts'};
    }
    if(type==='landings'){
      const acData=filtered.filter(function(e){return e[ac+'_landings']!=null;});
      if(acData.length<1) return null;
      const total=acData.reduce(function(s,e){return s+(e[ac+'_landings']||0);},0);
      return{ac,total,unit:'landings'};
    }
    // hours
    const acData=filtered.filter(function(e){return e[ac]!=null;});
    if(acData.length<2) return null;
    const total=acData[acData.length-1][ac]-acData[0][ac];
    return{ac,total:Math.round(total*10)/10,unit:'hours flown'};
  }).filter(Boolean);

  const summaryHtml=summary.length?`<div class="card" style="margin-bottom:12px">
    <div class="st">Period Summary: ${sf.from||'all time'} → ${sf.to||'now'}</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;padding:4px 0">
      ${summary.map(function(s){return`<div style="text-align:center;padding:8px;background:var(--card2);border-radius:8px;border:1px solid ${AC_COL[s.ac]||'#888'}">
        <div style="font-size:11px;font-weight:700;color:${AC_COL[s.ac]||'#888'}">${s.ac}</div>
        <div style="font-size:20px;font-weight:800;color:var(--text)">${s.total}</div>
        <div style="font-size:10px;color:var(--text3)">${s.unit}</div>
      </div>`;}).join('')}
    </div>
  </div>`:'' ;

  const rows=filtered.slice().reverse().slice(0,100).map(function(e){
    const cols=acCols.map(function(ac){
      let val,display;
      if(type==='starts'){val=e[ac+'_starts'];display=val!=null?String(val):'—';}
      else if(type==='landings'){val=e[ac+'_landings'];display=val!=null?String(val):'—';}
      else if(type==='oil'){val=e[ac];display=val!=null?val.toFixed(1)+' qt':'—';}
      else{val=e[ac];display=val!=null?val.toFixed(1):'—';}
      return'<td style="padding:5px 8px;text-align:right;font-size:12px;color:'+(val!=null?'var(--text)':'var(--text3)')+'">'+display+'</td>';
    }).join('');
    return'<tr><td style="padding:5px 8px;font-size:12px;color:var(--text3)">'+fmtMaintDate(e.date)+'</td>'+cols+
      (e.comment?'<td style="padding:5px 8px;font-size:11px;color:var(--text3);font-style:italic">'+e.comment+'</td>':'<td></td>')+'</tr>';
  }).join('');

  return form+summaryHtml+`<div class="card" style="overflow-x:auto">
    <div class="st">Results (${filtered.length})</div>
    <table style="width:100%;border-collapse:collapse">
      <thead><tr style="border-bottom:2px solid var(--border)">
        <th style="padding:6px 8px;text-align:left;font-size:11px;color:var(--text3)">Date</th>
        ${acCols.map(ac=>'<th style="padding:6px 8px;text-align:right;font-size:11px;color:'+(AC_COL[ac]||'#888')+'">'+ac+'</th>').join('')}
        <th style="padding:6px 8px;text-align:left;font-size:11px;color:var(--text3)">Notes</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

window.saveMaintField=function(date,ac,field,rawVal){
  const val=rawVal.trim();
  initMaintenance();
  if(field==='oil'){
    const v=parseFloat(val)||0;
    S.maintenance.oil=S.maintenance.oil||[];
    var oilEntry=S.maintenance.oil.find(function(e){return e.date===date;});
    if(!oilEntry&&v>0){oilEntry={date};S.maintenance.oil.push(oilEntry);S.maintenance.oil.sort(function(a,b){return a.date.localeCompare(b.date);});}
    if(oilEntry){if(v>0)oilEntry[ac]=v;else delete oilEntry[ac];}
  } else {
    var existing=S.maintenance.hist.find(function(e){return e.date===date;});
    if(!existing&&val){existing={date};S.maintenance.hist.push(existing);S.maintenance.hist.sort(function(a,b){return a.date.localeCompare(b.date);});}
    if(existing){
      if(field==='ttis'){const v=parseFloat(val);if(!isNaN(v)&&v>0)existing[ac]=v;else delete existing[ac];}
      else if(field==='starts'){const v=parseInt(val);if(!isNaN(v)&&v>=0)existing[ac+'_starts']=v;else delete existing[ac+'_starts'];}
      else if(field==='landings'){const v=parseInt(val);if(!isNaN(v)&&v>=0)existing[ac+'_landings']=v;else delete existing[ac+'_landings'];}
      else if(field==='comment'){if(val)existing.comment=val;else delete existing.comment;}
    }
  }
  saveMaintenance();
  if(rawVal.trim()) auditLog('maint_field_edit',{date:date,ac:ac,field:field,val:rawVal.trim()});
  render();
};
window.addMaintEntry=function(){
  const cwSel=document.getElementById('ml_compwash')?.checked?'done':'';
  const adasSel=document.getElementById('ml_adas')?.checked?'done':'';
  const date=document.getElementById('ml_date')?.value;
  if(!date){toast('Select a date.','warn');return;}
  const ac=S.maintEntryAc||'ZK-SLD';
  const hours=parseFloat(document.getElementById('ml_hours')?.value);
  const starts=parseInt(document.getElementById('ml_starts')?.value)||0;
  const landings=parseInt(document.getElementById('ml_landings')?.value)||0;
  const oil=parseFloat(document.getElementById('ml_oil')?.value)||0;
  const comment=document.getElementById('ml_comment')?.value||'';
  if(!hours||hours<=0){toast('Enter TTIS hours for '+ac,'warn');return;}
  // Sanity checks on TTIS hours used
  const prevHrs=maintGetLatest(ac);
  if(prevHrs!=null){
    const used=hours-prevHrs;
    if(used<0.5&&used>=0){
      if(!confirm('Hours used since last entry: '+used.toFixed(1)+'hrs — this is less than 0.5hrs. Is this correct?')) return;
    }
    if(used>10){
      if(!confirm('Hours used since last entry: '+used.toFixed(1)+'hrs — this is more than 10hrs. Is this correct?')) return;
    }
  }
  // Sanity checks on oil
  if(oil>1){
    if(!confirm('Oil added: '+oil+' quarts — more than 1qt. Is this correct?')) return;
  }
  // Sanity checks on starts/landings
  if(starts>8){
    if(!confirm('Starts entered: '+starts+' — more than 8. Is this correct?')) return;
  }
  if(landings>8){
    if(!confirm('Landings entered: '+landings+' — more than 8. Is this correct?')) return;
  }
  initMaintenance();
  // Update hist entry (hours)
  var existing=S.maintenance.hist.find(function(e){return e.date===date;});
  if(!existing){existing={date};S.maintenance.hist.push(existing);S.maintenance.hist.sort(function(a,b){return a.date.localeCompare(b.date);});}
  existing[ac]=hours;
  if(starts>0){existing[ac+'_starts']=starts;}
  if(landings>0){existing[ac+'_landings']=landings;}
  if(comment) existing.comment=comment;
  // Update oil separately
  if(oil>0){
    S.maintenance.oil=S.maintenance.oil||[];
    var oilEntry=S.maintenance.oil.find(function(e){return e.date===date;});
    if(!oilEntry){oilEntry={date};S.maintenance.oil.push(oilEntry);S.maintenance.oil.sort(function(a,b){return a.date.localeCompare(b.date);});}
    oilEntry[ac]=oil;
  }
  // Save compwash/adas completion if logged
  if(cwSel==='done'){if(!S.maintenance.compwash)S.maintenance.compwash={};var _cwa=S.maintenance.compwash[ac]||[];if(!Array.isArray(_cwa))_cwa=_cwa?[_cwa]:[];if(!_cwa.includes(date))_cwa.push(date);S.maintenance.compwash[ac]=_cwa;}
  if(adasSel==='done'){if(!S.maintenance.adas)S.maintenance.adas={};var _ada=S.maintenance.adas[ac]||[];if(!Array.isArray(_ada))_ada=_ada?[_ada]:[];if(!_ada.includes(date))_ada.push(date);S.maintenance.adas[ac]=_ada;}
  saveMaintenance();
  toast('Entry saved: '+ac+' '+hours+'hrs on '+fmtMaintDate(date),'ok');auditLog('maint_entry_add',{date:date,ac:ac,ttis:hours,starts:starts,landings:landings,oil:oil});S.appMsg=null;render();
};
window.toggleCWLog=function(date,ac){
  if(!S.maintenance.compwash)S.maintenance.compwash={};
  var arr=S.maintenance.compwash[ac]||[];if(!Array.isArray(arr))arr=arr?[arr]:[];
  var ix=arr.indexOf(date);if(ix>=0)arr.splice(ix,1);else arr.push(date);
  S.maintenance.compwash[ac]=arr;auditLog('maint_compwash_toggle',{date:date,ac:ac});saveMaintenance();render();
};
window.toggleADASLog=function(date,ac){

<div id="ptr-indicator" style="position:fixed;top:0;left:0;right:0;z-index:99999;display:flex;align-items:center;justify-content:center;height:0;overflow:hidden;background:var(--bg,#0f172a);transition:height .15s;pointer-events:none">
  <div id="ptr-inner" style="display:flex;align-items:center;gap:8px;font-size:13px;color:rgba(255,255,255,.5);padding:10px 0">
    <span id="ptr-icon" style="font-size:18px;transition:transform .3s">↓</span>
    <span id="ptr-label">Pull to refresh</span>
  </div>
</div>
<script>
(function(){
  var startY=0, pulling=false, triggered=false;
  var indicator=document.getElementById('ptr-indicator');
  var icon=document.getElementById('ptr-icon');
  var label=document.getElementById('ptr-label');
  var THRESHOLD=72;
  document.addEventListener('touchstart',function(e){
    if(window.scrollY===0){startY=e.touches[0].clientY;pulling=true;triggered=false;}
  },{passive:true});
  document.addEventListener('touchmove',function(e){
    if(!pulling||triggered) return;
    var dy=e.touches[0].clientY-startY;
    if(dy<=0){indicator.style.height='0';return;}
    var h=Math.min(dy*0.45,52);
    indicator.style.height=h+'px';
    if(dy>=THRESHOLD){icon.style.transform='rotate(180deg)';label.textContent='Release to refresh';}
    else{icon.style.transform='rotate(0deg)';label.textContent='Pull to refresh';}
  },{passive:true});
  document.addEventListener('touchend',function(e){
    if(!pulling) return;
    pulling=false;
    var dy=e.changedTouches[0].clientY-startY;
    if(dy>=THRESHOLD&&!triggered){
      triggered=true;if(navigator.vibrate)navigator.vibrate(50);icon.textContent='↻';icon.style.transform='rotate(0deg)';
      label.textContent='Refreshing…';indicator.style.height='52px';
      setTimeout(function(){window.location.reload();},400);
    } else {indicator.style.height='0';}
  },{passive:true});
})();
</script>

  var base=ROSTER_SC[key]||ROSTER_SC[''];

  function lc(v){return Math.min(255,v+Math.round((255-v)*0.3));}
  var col='#'+[lc(r),lc(g),lc(b)].map(function(v){return v.toString(16).padStart(2,'0');}).join('');

// ── Window functions ──



window.rosterSetCell=function(uid,ini,ds,val){
  if(val==='other'){
    S._rosterOtherEdit={uid:uid,ini:ini,ds:ds};
    render();
    return;
  }
  S._rosterOtherEdit=null;
  window._rosterDraftSet(uid,ini,ds,val);
};
window.rosterOtherConfirm=function(uid,ini,ds){
  var el=document.getElementById('_rOtherInput_'+ds+'_'+uid);
  var note=el?el.value.trim():'';
  S._rosterOtherEdit=null;
  window._rosterDraftSet(uid,ini,ds,note?'other:'+note:'other');
};
window.rosterOtherCancel=function(){
  S._rosterOtherEdit=null;
  render();
};
window.rosterSet=function(uid,ini,ds,val){
  window._rosterDraftSet(uid,ini,ds,val);
};
window._rosterDraftSet=function(uid,ini,ds,val){
  // Push current draft to undo stack (max 10)
  if(!S._rosterUndoStack)S._rosterUndoStack=[];
  S._rosterUndoStack.push(JSON.stringify(S._rosterDraft||{}));
  if(S._rosterUndoStack.length>10)S._rosterUndoStack.shift();
  // Apply to draft
  if(!S._rosterDraft)S._rosterDraft={};
  if(!S._rosterDraft[ds])S._rosterDraft[ds]={};
  if(val){
    S._rosterDraft[ds][uid]=val;
    if(ini)S._rosterDraft[ds][ini]=val;
  }else{
    delete S._rosterDraft[ds][uid];
    if(ini)delete S._rosterDraft[ds][ini];
    if(!Object.keys(S._rosterDraft[ds]).length)delete S._rosterDraft[ds];
  }
  render();
};

window.rosterTplSet=function(di,uid,val){
  if(!S.rosterBuild)S.rosterBuild={};
  if(!S.rosterBuild.template)S.rosterBuild.template={};
  if(!S.rosterBuild.template[di])S.rosterBuild.template[di]={};
  if(val)S.rosterBuild.template[di][uid]=val;
  else delete S.rosterBuild.template[di][uid];
  render();
};

window.rosterApplyPattern=function(){
  var bs=S.rosterBuild||{};
  var tpl=bs.template||{};
  var enabled=bs.enabled||{};
  var startStr=bs.startDate;
  var weeks=bs.weeks||4;
  if(!startStr){alert('Set a start date.');return;}
  var startD=new Date(startStr+'T00:00:00');
  if(isNaN(startD.getTime())){alert('Invalid start date.');return;}
  var PROTECTED=new Set(['leave','sick']);
  if(!S.roster)S.roster={};
  var count=0;
  for(var w=0;w<weeks;w++){
    for(var di=0;di<7;di++){
      var d=new Date(startD);
      d.setDate(d.getDate()+w*7+di);
      var ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
      if(!S.roster[ds])S.roster[ds]={};
      var dayTpl=tpl[di]||{};
      Object.keys(dayTpl).forEach(function(uid){
        if(enabled[uid]===false)return;  // skip toggled-off people
        var newSt=dayTpl[uid];
        if(!newSt)return;
        var ex=S.roster[ds][uid]||'';
        var exRaw=ex.indexOf('other:')===0?'other':ex;
        if(PROTECTED.has(exRaw))return;
        S.roster[ds][uid]=newSt;
        count++;
      });
    }
  }
  lsSet('ts_roster',S.roster);
  window.saveRosterToCloud();
  toast('Pushed '+count+' cells across '+weeks+' week'+(weeks!==1?'s':'')+'.','success');
  S.rosterTab='view';
  S.rosterWeek=startStr;
  render();
};

window.saveRosterToCloud=async function(){

  var draft=S._rosterDraft||{};

  S._rosterUndoStack=[];

window.loadRosterFromCloud=async function(){

window.loadRosterLeave=async function(){
  var weekStart=S.rosterWeek;
  if(!weekStart)return;
  var endD=new Date(weekStart+'T00:00:00');
  endD.setDate(endD.getDate()+6);
  var weekEnd=endD.getFullYear()+'-'+String(endD.getMonth()+1).padStart(2,'0')+'-'+String(endD.getDate()).padStart(2,'0');
  try{
    var r=await fetch(SB+'/rest/v1/ts_leave_requests?select=*&status=eq.approved&start_date=lte.'+weekEnd+'&end_date=gte.'+weekStart,{headers:SH});
    if(!r.ok)return;
    var rows=await r.json();
    var lookup={};
    rows.forEach(function(req){
      var s=new Date(req.start_date+'T00:00:00'),e=new Date(req.end_date+'T00:00:00');
      var lo=new Date(Math.max(s.getTime(),new Date(weekStart+'T00:00:00').getTime()));
      var hi=new Date(Math.min(e.getTime(),new Date(weekEnd+'T00:00:00').getTime()));
      for(var d=new Date(lo);d<=hi;d.setDate(d.getDate()+1)){
        var ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
        if(!lookup[ds])lookup[ds]={};
        lookup[ds][req.user_id]=req.leave_type;
      }
    });
    S._rosterLeave=lookup;
    safeRender();
  }catch(e){}
};


window.rosterJump=function(v){
  if(!v)return;
  var d=new Date(v+'T00:00:00');
  if(isNaN(d.getTime()))return;
  var day=d.getDay();
  var diff=day===0?-6:1-day;
  d.setDate(d.getDate()+diff);
  var iso=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  S.rosterWeek=iso;
  S._rosterLeaveWeek=null;
  setTimeout(render,0);
};

var LEAVE_TYPES=[
  {id:'annual', lbl:'Annual Leave',  icon:'🌴'},
  {id:'sick',   lbl:'Sick Leave',    icon:'🤒'},
  {id:'unpaid', lbl:'Unpaid Leave',  icon:'💸'},
  {id:'other',  lbl:'Other',         icon:'📝'}
];
var LEAVE_SC={
  pending:  {bg:'rgba(245,158,11,.14)', bd:'#f59e0b', col:'#f59e0b', lbl:'Pending'},
  approved: {bg:'rgba(34,197,94,.15)',  bd:'#22c55e', col:'#22c55e', lbl:'Approved'},
  declined: {bg:'rgba(239,68,68,.14)',  bd:'#ef4444', col:'#ef4444', lbl:'Declined'},
  withdrawn:{bg:'rgba(100,116,139,.14)',bd:'#64748b', col:'#64748b', lbl:'Withdrawn'}
};

function _lvEsc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function _lvDays(s,e,partial){if(!s||!e)return 0;var d=Math.round((new Date(e)-new Date(s))/86400000)+1;return partial?Math.max(0.5,d-0.5):d;}
function _lvFmt(ds){if(!ds)return '';var d=new Date(ds+'T00:00:00');return d.toLocaleDateString('en-NZ',{day:'numeric',month:'short',year:'numeric'});}
function _lvCanApprove(role){return role==='superadmin'||role==='admin'||role==='cx_manager';}
function _lvCanApproveRole(myRole,reqRole){
  if(myRole==='superadmin')return true;
  if(myRole==='admin')return reqRole!=='superadmin';
  if(myRole==='cx_manager')return reqRole==='desk'||reqRole==='ground_staff';
  return false;
}

function _lvTab(label,id,cur){
  var on=cur===id;
  return '<button tabindex="-1" onclick="if(!S._leave)S._leave={};S._leave.tab=\''+id+'\';render()" style="padding:8px 18px;border:none;border-radius:8px 8px 0 0;background:'+(on?'rgba(124,58,237,.2)':'transparent')+';color:'+(on?'#c084fc':'rgba(255,255,255,.45)')+';font-size:13px;font-weight:'+(on?'700':'500')+';cursor:pointer;border-bottom:2px solid '+(on?'#c084fc':'transparent')+'">'+label+'</button>';
}

function _lvToggle(on,onclick){
  return '<button tabindex="-1" onclick="'+onclick+'" style="display:inline-flex;align-items:center;width:44px;height:26px;border-radius:13px;background:'+(on?'#22c55e':'#475569')+';border:none;cursor:pointer;padding:0;flex-shrink:0"><div style="width:20px;height:20px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.4);transition:transform .15s;transform:translateX('+(on?'21':'3')+'px)"></div></button>';
}

function _lvStatusBadge(status){
  var sc=LEAVE_SC[status]||LEAVE_SC.pending;
  return '<span style="padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700;background:'+sc.bg+';color:'+sc.col+';border:1px solid '+sc.bd+';white-space:nowrap">'+sc.lbl+'</span>';

// ── Init state ──
function _lvInit(){
  if(!S._leave)S._leave={tab:'my'};
  var lv=S._leave;
  if(lv.myReqs===undefined)lv.myReqs=null;
  if(lv.allReqs===undefined)lv.allReqs=null;
  if(!lv._myLoaded)lv._myLoaded=false;
  if(!lv._allLoaded)lv._allLoaded=false;
  if(!lv.form)lv.form={show:false,type:'annual',startDate:'',endDate:'',partialDay:false,partialType:'am',reason:''};
  if(!lv.filter)lv.filter={status:'pending',userId:'',dateFrom:'',dateTo:''};
  if(lv.declineId===undefined)lv.declineId=null;
  if(lv.declineComment===undefined)lv.declineComment='';
  return lv;
}

// ── Main render ──
function renderLeave(){
  var role=S.user?.role||'desk';
  var lv=_lvInit();
  var canApprove=_lvCanApprove(role);

  if(!lv._myLoaded){lv._myLoaded=true;window.loadMyLeave();}
  if(canApprove&&!lv._allLoaded){lv._allLoaded=true;window.loadAllLeave();}

  var pendingCt=canApprove&&lv.allReqs
    ?lv.allReqs.filter(function(r){return r.status==='pending'&&_lvCanApproveRole(role,r.user_role||'desk');}).length
    :0;

  var h='<div style="padding:20px 16px;max-width:960px;margin:0 auto">';
  h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px">';
  h+='<div><h2 style="font-size:20px;font-weight:700;color:var(--text);margin:0 0 2px">Leave Management</h2>';
  h+='<div style="font-size:12px;color:var(--text3)">Submit and track leave requests</div></div>';
  h+='</div>';

  h+='<div style="display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:20px">';
  h+=_lvTab('My Leave','my',lv.tab);
  if(canApprove)h+=_lvTab('Approvals'+(pendingCt>0?' ('+pendingCt+')':''),'approvals',lv.tab);
  h+='</div>';

  if(lv.tab==='my')h+=_renderMyLeave(lv);
  else if(lv.tab==='approvals')h+=_renderApprovals(lv,role);

  h+='</div>';
  return h;
}

// ── Approvals tab ──
function _renderApprovals(lv,role){
  var allReqs=lv.allReqs;
  var f=lv.filter;
  var h='';

  // Filter pills + date range
  h+='<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center">';
  [{id:'pending',lbl:'Pending'},{id:'approved',lbl:'Approved'},{id:'declined',lbl:'Declined'},{id:'all',lbl:'All'}].forEach(function(s){
    var on=f.status===s.id;
    var cnt=allReqs?allReqs.filter(function(r){
      var canSee=_lvCanApproveRole(role,r.user_role||'desk');
      return canSee&&(s.id==='all'||r.status===s.id);
    }).length:0;
    h+='<button tabindex="-1" onclick="S._leave.filter.status=\''+s.id+'\';render()" style="padding:5px 12px;border-radius:7px;border:1.5px solid '+(on?'#c084fc':'rgba(255,255,255,.12)')+';background:'+(on?'rgba(124,58,237,.18)':'transparent')+';color:'+(on?'#c084fc':'rgba(255,255,255,.45)')+';font-size:12px;font-weight:'+(on?'700':'500')+';cursor:pointer">'+s.lbl+(cnt>0?' ('+cnt+')':'')+'</button>';
  });
  h+='<div style="display:flex;gap:6px;align-items:center;margin-left:auto">';
  h+='<input type="date" value="'+f.dateFrom+'" oninput="S._leave.filter.dateFrom=this.value;render()" title="From" style="padding:5px 9px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:7px;color:var(--text);font-size:12px">';
  h+='<span style="color:var(--text3);font-size:12px">to</span>';
  h+='<input type="date" value="'+f.dateTo+'" oninput="S._leave.filter.dateTo=this.value;render()" title="To" style="padding:5px 9px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:7px;color:var(--text);font-size:12px">';
  h+='<button tabindex="-1" onclick="S._leave._allLoaded=false;window.loadAllLeave()" style="padding:5px 10px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:7px;color:rgba(255,255,255,.5);font-size:12px;cursor:pointer">⟳</button>';
  h+='</div>';
  h+='</div>';

  if(!allReqs){
    return h+'<div style="text-align:center;padding:40px;color:var(--text3);font-size:13px">Loading...</div>';
  }

  var filtered=allReqs.filter(function(r){
    if(!_lvCanApproveRole(role,r.user_role||'desk'))return false;
    if(f.status!=='all'&&r.status!==f.status)return false;
    if(f.dateFrom&&r.end_date<f.dateFrom)return false;
    if(f.dateTo&&r.start_date>f.dateTo)return false;
    return true;
  });

  if(filtered.length===0){
    return h+'<div style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:40px;text-align:center;color:var(--text3);font-size:13px">No leave requests found.</div>';
  }

  filtered.forEach(function(r){
    var sc=LEAVE_SC[r.status]||LEAVE_SC.pending;
    var lt=LEAVE_TYPES.find(function(t){return t.id===r.leave_type;})||{icon:'📝',lbl:r.leave_type||'Leave'};
    var days=r.total_days||1;
    var isDecline=lv.declineId===r.id;

    // Overlap warning
    var overlaps=allReqs.filter(function(o){
      return o.id!==r.id&&o.status==='approved'&&o.start_date<=r.end_date&&o.end_date>=r.start_date;
    });

    h+='<div style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:16px;margin-bottom:10px">';

    // Name + role tag
    h+='<div style="display:flex;align-items:flex-start;gap:10px;flex-wrap:wrap">';
    h+='<div style="flex:1;min-width:200px">';
    h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap">';
    h+='<span style="font-size:14px;font-weight:700;color:var(--text)">'+_lvEsc(r.user_name||'Unknown')+'</span>';
    h+='<span style="font-size:10px;padding:2px 7px;border-radius:5px;background:rgba(255,255,255,.07);color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.06em">'+(r.user_role||'')+'</span>';
    h+='</div>';
    h+='<div style="font-size:13px;color:var(--text2);margin-bottom:4px">'+lt.icon+' '+lt.lbl;
    if(r.partial_day){h+=' <span style="font-size:11px;padding:2px 6px;border-radius:5px;background:rgba(99,102,241,.18);color:#818cf8">½ '+(r.partial_type||'am').toUpperCase()+'</span>';}
    h+='</div>';
    h+='<div style="font-size:13px;color:var(--text3)">📅 '+_lvFmt(r.start_date)+' → '+_lvFmt(r.end_date)+'<span style="margin-left:8px">('+days+' day'+(days!==1?'s':'')+')</span></div>';
    if(r.reason){h+='<div style="font-size:12px;color:var(--text3);margin-top:4px;font-style:italic">"'+_lvEsc(r.reason)+'"</div>';}
    h+='</div>';
    h+='<div style="flex-shrink:0">'+_lvStatusBadge(r.status)+'</div>';
    h+='</div>';

    // Overlap warning
    if(overlaps.length>0&&r.status==='pending'){
      var names=overlaps.map(function(o){return o.user_name||'Unknown';}).join(', ');
      h+='<div style="margin-top:8px;padding:7px 10px;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);border-radius:7px;font-size:12px;color:#fbbf24">⚠ Overlap: '+_lvEsc(names)+' also on leave during this period</div>';
    }

    // Submitted time + reviewed by
    h+='<div style="font-size:11px;color:var(--text3);margin-top:8px">Submitted '+new Date(r.submitted_at).toLocaleDateString('en-NZ',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})+'</div>';
    if(r.admin_comment){h+='<div style="margin-top:8px;font-size:12px;color:#f87171;background:rgba(239,68,68,.08);border-radius:7px;padding:7px 10px">💬 '+_lvEsc(r.admin_comment)+'</div>';}
    if(r.status!=='pending'&&r.reviewed_by_name){
      h+='<div style="font-size:11px;color:var(--text3);margin-top:4px">'+sc.lbl+' by '+_lvEsc(r.reviewed_by_name)+' · '+new Date(r.reviewed_at).toLocaleDateString('en-NZ',{day:'numeric',month:'short'})+'</div>';
    }

    // Approve / Decline buttons (pending only)
    if(r.status==='pending'){
      h+='<div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">';
      if(!isDecline){
        h+='<button tabindex="-1" onclick="window.approveLeave(\''+r.id+'\')" style="padding:7px 18px;background:#22c55e;border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:700;cursor:pointer">✓ Approve</button>';
        h+='<button tabindex="-1" onclick="S._leave.declineId=\''+r.id+'\';S._leave.declineComment=\'\';render()" style="padding:7px 14px;background:rgba(239,68,68,.12);border:1.5px solid rgba(239,68,68,.5);border-radius:8px;color:#f87171;font-size:13px;font-weight:700;cursor:pointer">✕ Decline</button>';
      } else {
        h+='<div style="width:100%">';
        h+='<textarea id="decline-comment-'+r.id+'" oninput="S._leave.declineComment=this.value" placeholder="Reason for declining (optional)" rows="2" style="width:100%;padding:8px 12px;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.15);border-radius:8px;color:var(--text);font-size:13px;box-sizing:border-box;font-family:inherit;resize:none;margin-bottom:8px">'+_lvEsc(lv.declineComment||'')+'</textarea>';
        h+='<div style="display:flex;gap:8px">';
        h+='<button tabindex="-1" onclick="window.declineLeave(\''+r.id+'\')" style="padding:7px 14px;background:#ef4444;border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:700;cursor:pointer">Confirm Decline</button>';
        h+='<button tabindex="-1" onclick="S._leave.declineId=null;render()" style="padding:7px 12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:rgba(255,255,255,.5);font-size:13px;cursor:pointer">Cancel</button>';
        h+='</div></div>';
      }
      h+='</div>';
    }
    h+='</div>';
  });
  return h;
}

// ── Notification panel ──
function renderNotificationPanel(){
  var notifs=S._notifications||[];
  var unread=notifs.filter(function(n){return !n.read;}).length;
  var h='<div id="notif-panel" onclick="event.stopPropagation()" style="position:absolute;top:calc(100% + 6px);right:0;width:320px;max-height:420px;overflow-y:auto;background:#111827;border:1px solid rgba(255,255,255,.12);border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.6);z-index:2100">';
  h+='<div style="padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#111827">';
  h+='<span style="font-size:13px;font-weight:700;color:var(--text)">🔔 Notifications</span>';
  if(unread>0){h+='<button tabindex="-1" onclick="window.markNotificationsRead()" style="font-size:11px;color:#a78bfa;background:none;border:none;cursor:pointer;padding:0">Mark all read</button>';}
  h+='</div>';
  if(notifs.length===0){
    h+='<div style="padding:24px;text-align:center;color:var(--text3);font-size:13px">No notifications</div>';
  } else {
    notifs.forEach(function(n){
      h+='<div style="padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.05);background:'+(n.read?'transparent':'rgba(124,58,237,.07)')+'">';
      if(!n.read){h+='<div style="width:6px;height:6px;border-radius:50%;background:#c084fc;display:inline-block;margin-right:6px;vertical-align:middle"></div>';}
      h+='<div style="font-size:12px;color:'+(n.read?'var(--text2)':'var(--text)')+';line-height:1.5;display:inline">'+_lvEsc(n.message||'')+'</div>';
      h+='<div style="font-size:10px;color:var(--text3);margin-top:4px">'+new Date(n.created_at).toLocaleDateString('en-NZ',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})+'</div>';
      if(n.type==='leave_submitted'&&n.reference_id){
        h+='<button tabindex="-1" onclick="S.section=\'leave\';_lvInit();S._leave.tab=\'approvals\';S._notifOpen=false;render()" style="font-size:11px;color:#a78bfa;background:none;border:none;cursor:pointer;padding:0;margin-top:4px">View request →</button>';
      }
      h+='</div>';
    });
  }
  h+='</div>';
  return h;
}

// ══════════════════════════════════════════════
// Cloud functions
// ══════════════════════════════════════════════

window.loadMyLeave=async function(){
  var uid=S.user?.id;if(!uid)return;
  var r=await fetch(SB+'/rest/v1/ts_leave_requests?select=*&user_id=eq.'+uid+'&order=submitted_at.desc',{headers:SH});
  if(r.ok){_lvInit().myReqs=(await r.json()).filter(Boolean);safeRender();}
};

window.loadAllLeave=async function(){
  var r=await fetch(SB+'/rest/v1/ts_leave_requests?select=*&order=submitted_at.desc',{headers:SH});
  if(r.ok){_lvInit().allReqs=(await r.json()).filter(Boolean);safeRender();}
};

window.submitLeaveRequest=async function(){
  var f=S._leave?.form;
  if(!f||!f.startDate||!f.endDate){toast('Please select start and end dates.','error');return;}
  if(f.endDate<f.startDate){toast('End date must be after start date.','error');return;}
  var uid=S.user?.id;
  var uname=S.user?.name||S.user?.email||'Unknown';
  var urole=S.user?.role||'desk';
  var days=_lvDays(f.startDate,f.endDate,f.partialDay);
  var payload={user_id:uid,user_name:uname,user_role:urole,
    leave_type:f.type,start_date:f.startDate,end_date:f.endDate,
    total_days:days,partial_day:f.partialDay,partial_type:f.partialType||'am',
    reason:f.reason||null,status:'pending',submitted_at:new Date().toISOString()};
  try{
    var r=await fetch(SB+'/rest/v1/ts_leave_requests',{
      method:'POST',
      headers:{...SH,'Prefer':'return=representation'},
      body:JSON.stringify([payload])
    });
    var res=r.ok?await r.json():null;
    if(res&&res[0]){
      try{await sbU('ts_leave_audit',[{request_id:res[0].id,action:'submitted',performed_by:uid,performed_by_name:uname}]);}catch(e){}
      try{await window._notifyLeaveApprovers(res[0].id,urole,uname,f.type,f.startDate,f.endDate);}catch(e){}
      try{window._triggerLeaveEmail(res[0].id,'submitted').catch(function(){});}catch(e){}
      S._leave.form={show:false,type:'annual',startDate:'',endDate:'',partialDay:false,partialType:'am',reason:''};
      S._leave._myLoaded=false;S._leave._allLoaded=false;
      toast('Leave request submitted!','success');
      window.loadMyLeave();
      if(_lvCanApprove(S.user?.role))window.loadAllLeave();
    } else {
      var errTxt='';
      try{errTxt=await r.text();}catch(e){}
      console.error('[submitLeave]',r&&r.status,errTxt);
      toast('Failed to submit request ('+((r&&r.status)||'network error')+').','error');
    }
  }catch(e){
    console.error('[submitLeave] exception:',e);
    toast('Failed to submit request.','error');
  }
};

window.approveLeave=async function(id){
  var me=S.user;
  var req=(S._leave?.allReqs||[]).find(function(r){return r.id===id;});
  if(!req)return;
  var overlaps=(S._leave?.allReqs||[]).filter(function(r){
    return r.id!==id&&r.status==='approved'&&r.start_date<=req.end_date&&r.end_date>=req.start_date;
  });
  if(overlaps.length>0){
    var names=overlaps.map(function(r){return r.user_name||'Unknown';}).join(', ');
    if(!confirm('Warning: '+names+' also have approved leave overlapping these dates. Approve anyway?'))return;
  }
  var ok=await sbPatch('ts_leave_requests',id,{
    status:'approved',reviewed_at:new Date().toISOString(),
    reviewed_by:me?.id,reviewed_by_name:me?.name||me?.email
  });
  if(ok){
    await sbU('ts_leave_audit',[{request_id:id,action:'approved',performed_by:me?.id,performed_by_name:me?.name||me?.email}]);
    await window._notifyLeaveUser(req.user_id,'approved',req.leave_type,req.start_date,req.end_date,null);
    window._triggerLeaveEmail(id,'approved').catch(function(){});
    S._leave._allLoaded=false;
    toast('Leave approved!','success');
    window.loadAllLeave();
  }
};

window.declineLeave=async function(id){
  var me=S.user;
  var comment=(document.getElementById('decline-comment-'+id)||{}).value||S._leave?.declineComment||'';
  var req=(S._leave?.allReqs||[]).find(function(r){return r.id===id;});
  if(!req)return;
  var ok=await sbPatch('ts_leave_requests',id,{
    status:'declined',admin_comment:comment||null,
    reviewed_at:new Date().toISOString(),reviewed_by:me?.id,reviewed_by_name:me?.name||me?.email
  });
  if(ok){
    await sbU('ts_leave_audit',[{request_id:id,action:'declined',performed_by:me?.id,performed_by_name:me?.name||me?.email,comment:comment||null}]);
    await window._notifyLeaveUser(req.user_id,'declined',req.leave_type,req.start_date,req.end_date,comment);
    window._triggerLeaveEmail(id,'declined').catch(function(){});
    S._leave.declineId=null;S._leave.declineComment='';S._leave._allLoaded=false;
    toast('Leave declined.','info');
    window.loadAllLeave();
  }
};

window.withdrawLeave=async function(id){
  if(!confirm('Withdraw this leave request?'))return;
  var ok=await sbPatch('ts_leave_requests',id,{status:'withdrawn'});
  if(ok){
    S._leave._myLoaded=false;
    toast('Leave request withdrawn.','info');
    window.loadMyLeave();
  }
};

// ── Notifications ──
window._notifyLeaveApprovers=async function(requestId,requesterRole,requesterName,leaveType,startDate,endDate){
  var approverRoles=(requesterRole==='desk'||requesterRole==='ground_staff')
    ?['cx_manager','admin','superadmin']:['admin','superadmin'];
  var approvers=(S.users||[]).filter(function(u){return approverRoles.indexOf(u.role)>=0&&!u.inactive;});
  if(!approvers.length)return;
  var lt=LEAVE_TYPES.find(function(t){return t.id===leaveType;});
  var msg=requesterName+' has requested '+(lt?lt.lbl:leaveType)+' from '+_lvFmt(startDate)+' to '+_lvFmt(endDate);
  var notifs=approvers.map(function(u){return{user_id:u.id,type:'leave_submitted',message:msg,reference_id:requestId,read:false,created_at:new Date().toISOString()};});
  await sbU('ts_notifications',notifs);
  window.loadNotifications();
};

window._notifyLeaveUser=async function(userId,action,leaveType,startDate,endDate,comment){
  var lt=LEAVE_TYPES.find(function(t){return t.id===leaveType;});
  var ltl=lt?lt.lbl:leaveType;
  var msg='Your '+ltl+' ('+_lvFmt(startDate)+' → '+_lvFmt(endDate)+') has been '
    +(action==='approved'?'approved ✓':'declined'+(comment?' — '+comment:''));
  await sbU('ts_notifications',[{user_id:userId,type:'leave_'+action,message:msg,read:false,created_at:new Date().toISOString()}]);
  if(S.user?.id===userId)window.loadNotifications();
};

window._triggerLeaveEmail=async function(requestId,action){
  return fetch(SB+'/functions/v1/send-leave-email',{
    method:'POST',
    headers:{...SH,'Content-Type':'application/json'},
    body:JSON.stringify({requestId:requestId,action:action})
  });
};

window.loadNotifications=async function(){
  var uid=S.user?.id;if(!uid)return;
  var r=await fetch(SB+'/rest/v1/ts_notifications?select=*&user_id=eq.'+uid+'&order=created_at.desc&limit=20',{headers:SH});
  if(r.ok){S._notifications=await r.json();safeRender();}
};

window.markNotificationsRead=async function(){
  var uid=S.user?.id;if(!uid)return;
  await fetch(SB+'/rest/v1/ts_notifications?user_id=eq.'+uid+'&read=eq.false',{
    method:'PATCH',headers:{...SH,'Prefer':'return=minimal'},body:JSON.stringify({read:true})
  });
  (S._notifications||[]).forEach(function(n){n.read=true;});
  S._notifOpen=false;
  safeRender();
};
</script>
