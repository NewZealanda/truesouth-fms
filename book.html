<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex">
<title>Book a flight · True South Flights</title>
<!-- ═══════════════════════════════════════════════════════════════════════════
  TrueSouth booking platform — PUBLIC direct-booking page (Phase 1 skeleton).
  Standalone like wx.html: no login; reads the ACTIVE product catalog straight
  from ts_products with the anon key (RLS: anon sees active rows only), and does
  everything stateful (availability / holds / booking) through the platform-book
  edge function (service role — anon has no write access to the tables).
  Payments are NOT wired yet: bookings confirm as pay-later; the Windcave hosted
  payment page redirect slots into the `payment` field of the book response.
  ⚠️ Not linked from anywhere until products are priced + activated in
  Settings ▸ Operations ▸ Products, products.sql is applied, and platform-book
  is deployed (supabase functions deploy platform-book --no-verify-jwt).
═══════════════════════════════════════════════════════════════════════════ -->
<style>
  :root{--bg:#eef3fa;--card:#ffffff;--card2:#f3f6fb;--bd:#dbe3ee;--tx:#15233b;--tx2:#475569;--tx3:#8294ac;--acc:#3f6390;--ok:#16a34a;--no:#dc2626;--amb:#d97706}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:linear-gradient(180deg,#e8eef7 0%,#f4f7fb 40%,#ffffff 100%);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;min-height:100vh;padding:max(20px,env(safe-area-inset-top)) 16px max(22px,env(safe-area-inset-bottom))}
  .wrap{max-width:560px;margin:0 auto}
  .brand{text-align:center;margin:8px 0 6px;font-weight:800;font-size:20px;color:var(--acc);letter-spacing:.4px}
  .sub{text-align:center;margin:0 0 18px;color:var(--tx3);font-size:13px}
  .card{background:var(--card);border:1px solid var(--bd);border-radius:16px;padding:20px;margin-bottom:14px;box-shadow:0 1px 3px rgba(20,35,59,.05)}
  .st{font-size:15px;font-weight:800;margin-bottom:10px}
  .prod{display:block;width:100%;text-align:left;background:var(--card2);border:1.5px solid var(--bd);border-radius:12px;padding:13px 15px;margin-bottom:9px;cursor:pointer;font:inherit;color:var(--tx)}
  .prod.on{border-color:var(--acc);background:#eaf0f8}
  .prod .pn{font-weight:800;font-size:15px}
  .prod .pd{font-size:12px;color:var(--tx2);margin-top:2px;line-height:1.4}
  .prod .pp{font-size:13px;font-weight:700;color:var(--acc);margin-top:4px}
  label.f{display:block;font-size:11px;font-weight:700;color:var(--tx3);margin:10px 0 3px;text-transform:uppercase;letter-spacing:.4px}
  input,textarea{width:100%;padding:11px 12px;border:1px solid var(--bd);border-radius:10px;font:inherit;font-size:15px;color:var(--tx);background:#fff}
  .slots{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
  .slot{padding:9px 14px;border:1.5px solid var(--bd);border-radius:10px;background:#fff;font-weight:700;font-size:14px;cursor:pointer;color:var(--tx)}
  .slot.on{border-color:var(--acc);background:#eaf0f8;color:var(--acc)}
  .slot.full{opacity:.4;cursor:not-allowed}
  .slot small{display:block;font-weight:600;font-size:10px;color:var(--tx3)}
  .steps{display:flex;align-items:center;gap:10px;margin:4px 0 8px}
  .steps .lb{flex:1;font-size:14px;font-weight:700}
  .steps small{display:block;font-weight:500;font-size:11px;color:var(--tx3)}
  .steps button{width:32px;height:32px;border-radius:9px;border:1px solid var(--bd);background:#fff;font-size:17px;font-weight:800;cursor:pointer;color:var(--tx2)}
  .steps .n{width:26px;text-align:center;font-weight:800;font-size:16px}
  .paxrow{display:flex;gap:8px;margin-bottom:7px}
  .paxrow input.wt{width:86px;flex-shrink:0}
  .paxrow .lap{width:86px;flex-shrink:0;font-size:11px;color:var(--tx3);align-self:center;text-align:center}
  .tot{display:flex;justify-content:space-between;font-size:15px;padding:8px 0;border-top:1px solid var(--bd)}
  .tot .v{font-weight:800}
  button.go{width:100%;padding:16px;background:var(--acc);border:none;border-radius:12px;color:#fff;font-size:17px;font-weight:800;cursor:pointer;margin-top:6px}
  button.go:disabled{opacity:.5;cursor:default}
  .note{font-size:13px;color:var(--tx2);background:var(--card2);border:1px solid var(--bd);border-radius:10px;padding:11px 13px;line-height:1.5;margin-top:12px}
  .err{color:var(--no);font-size:13px;font-weight:700;margin-top:10px;text-align:center}
  .done{text-align:center;padding:22px 8px}
  .done .tick{width:66px;height:66px;border-radius:50%;background:#eaf0f8;border:2px solid var(--acc);color:var(--acc);font-size:34px;line-height:62px;margin:0 auto 12px}
  .done h2{margin:0 0 6px;font-size:20px}
  .done p{color:var(--tx2);font-size:14px;margin:0 0 4px;line-height:1.5}
  .done .ord{font-size:22px;font-weight:800;color:var(--acc);margin:10px 0}
  .foot{text-align:center;color:var(--tx3);font-size:11px;margin-top:10px}
  .hide{display:none}
  .load{text-align:center;color:var(--tx3);padding:30px 12px;font-size:14px}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">TRUE SOUTH FLIGHTS</div>
  <p class="sub">Book your flight — Queenstown, Milford Sound, Mount Cook &amp; more</p>

  <div id="app"><div class="load">Loading flights…</div></div>
  <p class="foot">True South Flights · Queenstown, New Zealand</p>
</div>
<script>
'use strict';
var SB='https://wgycephyuwwfogggcbye.supabase.co';
var SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndneWNlcGh5dXd3Zm9nZ2djYnllIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4NjEzNzAsImV4cCI6MjA5NjQzNzM3MH0.6ac1fI7NxOJla_cI6P2bMwBXr3qkBTaHoyipcG9r95Q';
var FN=SB+'/functions/v1/platform-book';

// ── state ──
var PRODUCTS=[];                 // active catalog
var sel={prod:null,date:'',dep:'',a:1,c:0,i:0,adt:[],chd:[],inf:[],name:'',phone:'',email:'',note:''};
var SLOTS=null;                  // availability for sel.date {dep:sellable}
var PTIMES=null;                 // per-product timetable resolved for sel.date (summer/winter)
var HOLD=null;                   // {holdId, expiresAt}
var BUSY=false, ERR='', DONE=null;

function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function todayNZ(){try{return new Date().toLocaleDateString('en-CA',{timeZone:'Pacific/Auckland'});}catch(e){return new Date().toISOString().slice(0,10);}}
function money(n){return (n!=null&&isFinite(n))?('$'+(+n).toLocaleString('en-NZ',{minimumFractionDigits:0,maximumFractionDigits:2})):null;}

// ── API ──
function api(payload){
  return fetch(FN,{method:'POST',headers:{'Content-Type':'application/json','apikey':SK,'Authorization':'Bearer '+SK},body:JSON.stringify(payload)})
    .then(function(r){return r.json();});
}
function loadCatalog(){
  // Anon RLS: only active rows are visible — read the catalog straight from REST.
  return fetch(SB+'/rest/v1/ts_products?select=*&active=eq.true&order=sort.asc',{headers:{'apikey':SK,'Authorization':'Bearer '+SK}})
    .then(function(r){return r.ok?r.json():[];})
    .then(function(rows){PRODUCTS=rows||[];render();})
    .catch(function(){PRODUCTS=[];render();});
}
function loadAvail(){
  SLOTS=null;PTIMES=null;render();
  api({action:'availability',date:sel.date,product:sel.prod&&sel.prod.id}).then(function(r){
    SLOTS=(r&&r.ok)?(r.slots||{}):{};
    PTIMES=(r&&r.ok)?(r.productTimes||null):null;
    render();
  }).catch(function(){SLOTS={};PTIMES=null;render();});
}
// Hold seats when a departure is picked (released + re-placed on change).
function placeHold(){
  var seats=sel.a+sel.c;if(!sel.date||!sel.dep||seats<1)return;
  var old=HOLD;HOLD=null;
  if(old)api({action:'release',holdId:old.holdId});
  api({action:'hold',date:sel.date,dep:sel.dep,seats:seats,product:sel.prod&&sel.prod.id}).then(function(r){
    if(r&&r.ok)HOLD={holdId:r.holdId,expiresAt:r.expiresAt};
  });
}

// ── handlers ──
window.pickProd=function(code){
  sel.prod=PRODUCTS.find(function(p){return p.id===code;})||null;
  sel.dep='';SLOTS=null;ERR='';
  if(sel.date)loadAvail();else render();
};
window.setDate=function(v){sel.date=v;sel.dep='';ERR='';if(v&&sel.prod)loadAvail();else render();};
window.pickDep=function(t,full){if(full)return;sel.dep=t;ERR='';placeHold();render();};
window.cnt=function(k,d){
  sel[k]=Math.max(k==='a'?1:0,Math.min(13,(sel[k]||0)+d));
  if(sel.dep)placeHold();
  render();
};
window.pax=function(kind,idx,field,val){sel[kind]=sel[kind]||[];while(sel[kind].length<=idx)sel[kind].push({});sel[kind][idx][field]=val;};
window.fld=function(k,v){sel[k]=v;};
window.submitBk=function(){
  if(BUSY)return;ERR='';
  var name=String(sel.name||'').trim();
  if(!sel.prod){ERR='Choose a flight.';render();return;}
  if(!sel.date||!sel.dep){ERR='Choose a date and departure time.';render();return;}
  if(!name){ERR='Please enter your name.';render();return;}
  var em=String(sel.email||'').trim(),ph=String(sel.phone||'').trim();
  if(!em&&!ph){ERR='Please give a phone number or email so we can confirm.';render();return;}
  function paxArr(kind,n,withWt){var o=[];for(var x=0;x<n;x++){var p=(sel[kind]&&sel[kind][x])||{};o.push(withWt?{name:String(p.name||'').trim(),weight:String(p.wt||'').trim()}:{name:String(p.name||'').trim()});}return o;}
  BUSY=true;render();
  api({action:'book',date:sel.date,dep:sel.dep,product:sel.prod.id,holdId:HOLD&&HOLD.holdId,
    customer:{name:name,phone:ph,email:em},note:String(sel.note||'').trim(),
    adults:paxArr('adt',sel.a,true),children:paxArr('chd',sel.c,true),infants:paxArr('inf',sel.i,false)})
  .then(function(r){
    BUSY=false;
    if(r&&r.ok){DONE=r;HOLD=null;
      if(r.payment&&r.payment.url){location.href=r.payment.url;return;} // Windcave HPP (when wired)
      render();
    } else {ERR=(r&&r.error)||'Something went wrong — please call us.';if(/seats/i.test(ERR)&&sel.date)loadAvail();render();}
  }).catch(function(){BUSY=false;ERR='Network problem — please try again or call us.';render();});
};

// ── pricing (seasonal: resolved by FLIGHT date; next_from → next-season set) ──
function tierFor(p,date){
  var nx=!!(p&&p.next_from&&date&&String(date)>=String(p.next_from).slice(0,10));
  return nx?{a:p.next_price_adult,c:p.next_price_child,i:(p.next_price_infant!=null?p.next_price_infant:0),nx:true}
           :{a:p?p.price_adult:null,c:p?p.price_child:null,i:(p&&p.price_infant!=null)?p.price_infant:0,nx:false};
}
function priceTotal(){
  var p=sel.prod;if(!p)return {total:null,poa:false,nx:false};
  var tr=tierFor(p,sel.date);
  var poa=(sel.a>0&&tr.a==null)||(sel.c>0&&tr.c==null);
  if(poa)return {total:null,poa:true,nx:tr.nx};
  var t=sel.a*(+tr.a||0)+sel.c*(+tr.c||0)+sel.i*(+tr.i||0);
  return {total:Math.round(t*100)/100,poa:false,nx:tr.nx};
}
function fmtDate(d){try{return new Date(d+'T12:00:00').toLocaleDateString('en-NZ',{day:'numeric',month:'short',year:'numeric'});}catch(e){return d;}}

// ── render ──
function render(){
  var el=document.getElementById('app'),h='';
  if(DONE){
    el.innerHTML='<div class="card"><div class="done"><div class="tick">✓</div><h2>Booking received!</h2>'+
      '<div class="ord">'+esc(DONE.order)+'</div>'+
      '<p>'+esc(sel.prod?sel.prod.name:'')+' · '+esc(sel.date)+' at '+esc(sel.dep)+'</p>'+
      '<p>'+(sel.a+sel.c+sel.i)+' passenger'+((sel.a+sel.c+sel.i)>1?'s':'')+(DONE.total?' · total '+money(DONE.total):'')+'</p>'+
      '<p style="margin-top:12px">'+(DONE.poa?'We’ll be in touch to confirm pricing and payment.':'No payment is taken online yet — we’ll confirm your booking and arrange payment before you fly.')+'</p>'+
      '</div></div>';
    return;
  }
  if(!PRODUCTS.length){
    el.innerHTML='<div class="card"><div class="load">Online booking isn’t available right now.<br>Please call us to book your flight.</div></div>';
    return;
  }
  // 1 — product
  h+='<div class="card"><div class="st">1 · Choose your flight</div>';
  PRODUCTS.forEach(function(p){
    var tr=tierFor(p,sel.date);      // card prices follow the chosen flight date
    var pr=money(tr.a);
    h+='<button class="prod'+(sel.prod&&sel.prod.id===p.id?' on':'')+'" onclick="pickProd(\''+esc(p.id)+'\')">'+
      '<span class="pn">'+esc(p.name)+'</span>'+
      (p.description?'<span class="pd">'+esc(p.description)+'</span>':'')+
      '<span class="pp">'+(pr?pr+' adult':'Price on application')+(tr.c!=null?' · '+money(tr.c)+' child':'')+(p.duration_min?' · '+Math.round(p.duration_min/60*10)/10+' h':'')+'</span></button>';
  });
  h+='</div>';
  // 2 — date + time
  if(sel.prod){
    h+='<div class="card"><div class="st">2 · Date &amp; departure</div>'+
      '<label class="f">Date</label><input type="date" min="'+todayNZ()+'" value="'+esc(sel.date)+'" onchange="setDate(this.value)">';
    if(sel.date){
      // Offered times come STRICTLY from the server (Rezdy live sessions, resolved for THIS date) —
      // no client-side fallback to the summer catalog, so off-season slots never appear.
      var times=(PTIMES&&PTIMES[sel.prod.id])?PTIMES[sel.prod.id]:(SLOTS?Object.keys(SLOTS).sort():[]);
      if(SLOTS===null)h+='<div class="load" style="padding:14px">Checking seats…</div>';
      else if(!times.length)h+='<div class="load" style="padding:14px">No departures available for this flight on '+esc(fmtDate(sel.date))+' — please pick another date or call us.</div>';
      else{
        h+='<label class="f">Departure time</label><div class="slots">';
        times.forEach(function(t){
          var left=(SLOTS&&SLOTS[t]!=null)?SLOTS[t]:null,need=sel.a+sel.c;
          var full=(left!=null&&left<need);
          // Don't expose the raw seat count to customers: show "5+" once there's plenty, the exact
          // number only when it's getting tight (<5), and "full" when it can't take the party.
          var lbl=(left==null)?'':(full?'full':(left>=5?'5+ seats':(left+' seat'+(left===1?'':'s')+' left')));
          h+='<button class="slot'+(sel.dep===t?' on':'')+(full?' full':'')+'" onclick="pickDep(\''+esc(t)+'\','+(full?'true':'false')+')">'+esc(t)+
            (lbl?'<small>'+lbl+'</small>':'')+'</button>';
        });
        h+='</div>';
      }
    }
    h+='</div>';
  }
  // 3 — passengers
  if(sel.prod&&sel.date&&sel.dep){
    h+='<div class="card"><div class="st">3 · Passengers</div>';
    [['a','Adults','14+ years'],['c','Children','3–13 years'],['i','Infants','0–2 yrs / 15 kg or under — free, on a lap']].forEach(function(r){
      h+='<div class="steps"><div class="lb">'+r[1]+'<small>'+r[2]+'</small></div>'+
        '<button onclick="cnt(\''+r[0]+'\',-1)">−</button><div class="n">'+sel[r[0]]+'</div><button onclick="cnt(\''+r[0]+'\',1)">+</button></div>';
    });
    h+='<label class="f">Passenger names &amp; weights (kg) — needed for aircraft loading</label>';
    function rows(kind,n,ph,withWt){
      var o='';for(var x=0;x<n;x++){var p=(sel[kind]&&sel[kind][x])||{};
        o+='<div class="paxrow"><input type="text" value="'+esc(p.name||'')+'" placeholder="'+ph+' '+(x+1)+' name" oninput="pax(\''+kind+'\','+x+',\'name\',this.value)">'+
          (withWt?'<input class="wt" type="number" min="0" max="250" value="'+esc(p.wt||'')+'" placeholder="kg" oninput="pax(\''+kind+'\','+x+',\'wt\',this.value)">':'<span class="lap">on lap</span>')+'</div>';}
      return o;
    }
    h+=rows('adt',sel.a,'Adult',true)+rows('chd',sel.c,'Child',true)+rows('inf',sel.i,'Infant',false);
    h+='</div>';
    // 4 — contact + review
    var pt=priceTotal();
    h+='<div class="card"><div class="st">4 · Your details</div>'+
      '<label class="f">Full name</label><input type="text" value="'+esc(sel.name)+'" oninput="fld(\'name\',this.value)" placeholder="Booking name">'+
      '<label class="f">Phone</label><input type="tel" value="'+esc(sel.phone)+'" oninput="fld(\'phone\',this.value)" placeholder="+64 …">'+
      '<label class="f">Email</label><input type="email" value="'+esc(sel.email)+'" oninput="fld(\'email\',this.value)" placeholder="you@email.com">'+
      '<label class="f">Anything we should know? (optional)</label><textarea rows="2" oninput="fld(\'note\',this.value)">'+esc(sel.note)+'</textarea>'+
      '<div style="margin-top:14px">'+
      '<div class="tot"><span>'+sel.a+' adult'+(sel.a>1?'s':'')+(sel.c?' · '+sel.c+' child'+(sel.c>1?'ren':''):'')+(sel.i?' · '+sel.i+' infant'+(sel.i>1?'s':''):'')+'</span>'+
      '<span class="v">'+(pt.poa?'Price on application':money(pt.total))+'</span></div>'+
      (pt.nx&&sel.prod&&sel.prod.next_from?'<div style="font-size:11px;color:var(--tx3);text-align:right">Season pricing from '+esc(fmtDate(String(sel.prod.next_from).slice(0,10)))+'</div>':'')+
      '</div>'+
      '<button class="go" onclick="submitBk()" '+(BUSY?'disabled':'')+'>'+(BUSY?'Booking…':'Request booking')+'</button>'+
      (ERR?'<div class="err">'+esc(ERR)+'</div>':'')+
      '<div class="note">No payment is taken online yet. We’ll confirm your seats and arrange payment before you fly. Flights are weather-dependent — we’ll keep you posted.</div>'+
      '</div>';
  } else if(ERR){
    h+='<div class="err">'+esc(ERR)+'</div>';
  }
  el.innerHTML=h;
}

// Release the hold if the customer walks away mid-checkout.
window.addEventListener('pagehide',function(){
  if(HOLD&&!DONE){try{navigator.sendBeacon&&navigator.sendBeacon(FN,JSON.stringify({action:'release',holdId:HOLD.holdId}));}catch(e){}}
});

loadCatalog();
</script>
</body>
</html>
