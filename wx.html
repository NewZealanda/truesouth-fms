<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex">
<title>Weather update · True South Flights</title>
<style>
  :root{--bg:#eef3fa;--card:#ffffff;--card2:#f3f6fb;--bd:#dbe3ee;--tx:#15233b;--tx2:#475569;--tx3:#8294ac;--acc:#3f6390;--ok:#16a34a;--no:#dc2626;--amb:#d97706}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:linear-gradient(180deg,#e8eef7 0%,#f4f7fb 40%,#ffffff 100%);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;min-height:100vh;padding:max(20px,env(safe-area-inset-top)) 16px max(22px,env(safe-area-inset-bottom))}
  .wrap{max-width:520px;margin:0 auto}
  .brand{text-align:center;margin:8px 0 18px;position:relative;overflow:hidden}
  .logoWrap{position:relative;display:inline-flex;align-items:center}
  .logo{height:48px;width:auto;display:block}
  .plane{position:absolute;left:100%;bottom:3px;margin-left:8px;width:66px;height:auto;filter:drop-shadow(0 2px 4px rgba(20,35,59,.2));animation:flyIn 2.4s cubic-bezier(.17,.62,.3,1) .25s both}
  @keyframes flyIn{0%{transform:translateX(62vw) translateY(-16px) scale(1.06);opacity:0}45%{opacity:1}100%{transform:translateX(0) translateY(0) scale(1);opacity:1}}
  @media (prefers-reduced-motion:reduce){.plane{animation:none}}
  .sub{margin:11px 0 0;color:var(--tx3);font-size:13px}
  .card{background:var(--card);border:1px solid var(--bd);border-radius:16px;padding:20px;margin-bottom:14px;box-shadow:0 1px 3px rgba(20,35,59,.05)}
  .reveal{text-align:center;padding:28px 18px}
  .reveal p{color:var(--tx2);font-size:15px;line-height:1.5;margin:0 0 20px}
  button.go{width:100%;padding:16px;background:var(--acc);border:none;border-radius:12px;color:#fff;font-size:17px;font-weight:800;cursor:pointer}
  button.go:disabled{opacity:.55}
  button.sec{width:100%;padding:14px;background:#fff;border:1px solid var(--bd);border-radius:11px;color:var(--tx2);font-size:15px;font-weight:700;cursor:pointer;margin-top:10px}
  .banner{border-radius:13px;padding:16px 18px;margin-bottom:16px;text-align:center}
  .banner .t{font-size:20px;font-weight:800}
  .banner .s{font-size:13px;margin-top:3px;opacity:.95}
  .b-on{background:#e8f7ee;border:1px solid #b6e6c6}
  .b-on .t{color:#15803d}
  .b-no{background:#fdecec;border:1px solid #f6c3c3}
  .b-no .t{color:#b91c1c}
  .b-am{background:#fdf3e3;border:1px solid #f6dcab}
  .b-am .t{color:#b45309}
  .row{display:flex;justify-content:space-between;gap:12px;padding:9px 0;border-top:1px solid var(--bd);font-size:14px}
  .row:first-child{border-top:none}
  .row .k{color:var(--tx3)}
  .row .v{color:var(--tx);font-weight:700;text-align:right}
  .tags{display:flex;flex-wrap:wrap;gap:6px;justify-content:flex-end}
  .tag{background:var(--card2);border:1px solid var(--bd);border-radius:14px;padding:2px 10px;font-size:12px;color:var(--tx2)}
  .note{font-size:13px;color:var(--tx2);background:var(--card2);border:1px solid var(--bd);border-radius:10px;padding:11px 13px;line-height:1.5;margin-top:12px}
  .done{text-align:center;padding:22px 8px}
  .done .tick{width:66px;height:66px;border-radius:50%;background:#eaf0f8;border:2px solid var(--acc);color:var(--acc);font-size:34px;line-height:62px;margin:0 auto 12px}
  .done h2{margin:0 0 6px;font-size:20px}
  .done p{color:var(--tx2);font-size:14px;margin:0;line-height:1.5}
  .foot{text-align:center;color:var(--tx3);font-size:11px;margin-top:10px}
  .hide{display:none}
  .err{text-align:center;color:var(--tx2);padding:30px 12px;font-size:15px;line-height:1.5}
  a.call{display:inline-block;margin-top:10px;color:var(--acc);font-weight:700;text-decoration:none;font-size:15px}
</style>
</head>

      SNAP=d.snapshot; ACTED=d.action||null;
      if(SNAP.pax_name)$('sub').textContent='Hi '+esc(String(SNAP.pax_name).split(' ')[0])+' — here\'s your flight';
      $('loading').classList.add('hide');
      $('revealCard').classList.remove('hide');
    }catch(e){$('loading').innerHTML='<div class="err">Something went wrong loading your update.<br>Please try again, or contact True South Flights.</div>';}
  }
  function ack(action,note){try{rpc('wx_link_ack',{p_token:token,p_action:action,p_note:note||null});}catch(e){}}
  function reveal(){
    ack('view');
    $('revealCard').classList.add('hide');
    renderDetail();
  }
  function renderDetail(){
    var s=SNAP||{}, st=s.wx_status||'on';
    var pickup=(s.pickup_loc||s.pickup_time);
    var b = st==='cancelled' ? {c:'b-no',t:'Flight cancelled',s:'Weather isn\'t safe for today\'s flight'}
          : st==='final'     ? {c:'b-am',t:'Final call shortly',s:'We\'re making a final decision in the office'}
          :                    {c:'b-on',t:'Your flight is on ✈',s:'Weather looks good — see you soon'};
    var h='<div class="card">';
    h+='<div class="banner '+b.c+'"><div class="t">'+b.t+'</div><div class="s">'+esc(b.s)+'</div></div>';
    if(s.dep_label)h+='<div class="row"><span class="k">Flight</span><span class="v">'+esc(s.dep_label)+'</span></div>';
    if(s.dep_time)h+='<div class="row"><span class="k">Departure</span><span class="v">'+esc(s.dep_time)+(s.fr_date_label?' · '+esc(s.fr_date_label):'')+'</span></div>';
    if(s.wx_reasons&&s.wx_reasons.length)h+='<div class="row"><span class="k">Conditions</span><span class="v"><span class="tags">'+s.wx_reasons.map(function(r){return '<span class="tag">'+esc(r)+'</span>';}).join('')+'</span></span></div>';
    if(st==='cancelled'&&s.next_day)h+='<div class="row"><span class="k">Next best day</span><span class="v">'+esc(s.next_day)+'</span></div>';
    if(s.wx_comment)h+='<div class="note">'+esc(s.wx_comment)+'</div>';
    h+='</div>';

    if(st==='cancelled'){
      h+='<div class="card"><div class="row" style="border:none;padding-bottom:10px"><span class="k" style="font-weight:700;color:var(--tx)">What would you like to do?</span></div>'+
         '<button class="go" style="background:var(--no)" onclick="act(\'refund\')">Request a refund</button>'+
         '<button class="sec" onclick="act(\'contact\')">Ask us to reschedule / contact me</button></div>';
    } else {
      if(pickup){
        h+='<div class="card"><div class="row" style="border:none;padding-bottom:4px"><span class="k" style="font-weight:700;color:var(--tx)">Your pickup</span></div>';
        if(s.pickup_loc)h+='<div class="row"><span class="k">Location</span><span class="v">'+esc(s.pickup_loc)+'</span></div>';
        if(s.pickup_time)h+='<div class="row"><span class="k">Pickup time</span><span class="v">'+esc(s.pickup_time)+'</span></div>';
        h+='<button class="go" style="margin-top:14px;background:var(--ok)" onclick="act(\'confirmed\')">Confirm — I\'ll be there</button>'+
           '<button class="sec" onclick="act(\'self_drive\')">No pickup — I\'ll make my own way</button>'+
           '<button class="sec" onclick="act(\'change_pickup\')">I need to change my pickup</button></div>';
      } else {
        h+='<div class="card"><button class="go" style="background:var(--ok)" onclick="act(\'confirmed\')">Confirm — got it</button></div>';
      }
      if(st==='final')h+='<div class="card"><button class="sec" onclick="act(\'contact\')">Please contact me</button></div>';
    }
    if(s.op_phone)h+='<div style="text-align:center"><a class="call" href="tel:'+esc(s.op_phone)+'">Call True South · '+esc(s.op_phone)+'</a></div>';
    $('detail').innerHTML=h;
    $('detail').classList.remove('hide');
  }
  function act(a){
    ack(a);
    $('detail').classList.add('hide');
    var map={confirmed:['See you soon!','Thanks for confirming — we\'ll see you at your pickup.'],
             refund:['Refund requested','Thanks — our team will process your refund and be in touch.'],
             contact:['We\'ll be in touch','Thanks — someone from True South will contact you shortly.'],
             self_drive:['No pickup needed','Thanks — we\'ve noted you\'ll make your own way. See you at the airport!'],
             change_pickup:['Pickup change requested','Thanks — we\'ll be in touch to sort out your pickup.']};
    var m=map[a]||['Thank you',''];
    $('doneTitle').textContent=m[0];$('doneMsg').textContent=m[1];
    $('doneCard').classList.remove('hide');
    window.scrollTo(0,0);
  }
  load();
</script>
</body>
</html>
