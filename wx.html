<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex">
<title>Weather update · True South Flights</title>
<style>
  :root{--bg:#eef3fa;--card:#ffffff;--card2:#f3f6fb;--bd:#dbe3ee;--tx:#15233b;--tx2:#475569;--tx3:#8294ac;--acc:#3f6390;--ok:#16a34a;--no:#dc2626;--amb:#d97706}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:linear-gradient(180deg,#e8eef7 0%,#f4f7fb 40%,#ffffff 100%);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;min-height:100vh;padding:max(20px,env(safe-area-inset-top)) 16px max(22px,env(safe-area-inset-bottom))}
  .wrap{max-width:520px;margin:0 auto}
  .brand{text-align:center;margin:8px 0 18px;position:relative;overflow:hidden}
  .logoWrap{position:relative;display:inline-flex;align-items:center}
  .logo{height:48px;width:auto;display:block}
  .plane{position:absolute;left:100%;bottom:1px;margin-left:10px;width:132px;height:auto;filter:drop-shadow(0 2px 4px rgba(20,35,59,.2));animation:flyIn 2.6s cubic-bezier(.17,.62,.3,1) .25s both}
  @media (max-width:430px){.plane{width:104px;margin-left:7px}}
  @keyframes flyIn{0%{transform:translateX(62vw) translateY(-16px) scale(1.06);opacity:0}45%{opacity:1}100%{transform:translateX(0) translateY(0) scale(1);opacity:1}}
  @media (prefers-reduced-motion:reduce){.plane{animation:none}}
  .sub{margin:11px 0 0;color:var(--tx3);font-size:13px}
  .card{background:var(--card);border:1px solid var(--bd);border-radius:16px;padding:20px;margin-bottom:14px;box-shadow:0 1px 3px rgba(20,35,59,.05)}
  .reveal{text-align:center;padding:28px 18px}
  .reveal p{color:var(--tx2);font-size:15px;line-height:1.5;margin:0 0 20px}
  button.go{width:100%;padding:16px;background:var(--acc);border:none;border-radius:12px;color:#fff;font-size:17px;font-weight:800;cursor:pointer}
  button.go:disabled{opacity:.55}
  button.sec{width:100%;padding:14px;background:#fff;border:1px solid var(--bd);border-radius:11px;color:var(--tx2);font-size:15px;font-weight:700;cursor:pointer;margin-top:10px}
  .banner{border-radius:13px;padding:16px 18px;margin-bottom:16px;text-align:center}
  .banner .t{font-size:20px;font-weight:800}
  .banner .s{font-size:13px;margin-top:3px;opacity:.95}
  .b-on{background:#e8f7ee;border:1px solid #b6e6c6}
  .b-on .t{color:#15803d}
  .b-no{background:#fdecec;border:1px solid #f6c3c3}
  .b-no .t{color:#b91c1c}
  .b-am{background:#fdf3e3;border:1px solid #f6dcab}
  .b-am .t{color:#b45309}
  .row{display:flex;justify-content:space-between;gap:12px;padding:9px 0;border-top:1px solid var(--bd);font-size:14px}
  .row:first-child{border-top:none}
  .row .k{color:var(--tx3)}
  .row .v{color:var(--tx);font-weight:700;text-align:right}
  .tags{display:flex;flex-wrap:wrap;gap:6px;justify-content:flex-end}
  .tag{background:var(--card2);border:1px solid var(--bd);border-radius:14px;padding:2px 10px;font-size:12px;color:var(--tx2)}
  .note{font-size:13px;color:var(--tx2);background:var(--card2);border:1px solid var(--bd);border-radius:10px;padding:11px 13px;line-height:1.5;margin-top:12px}
  .done{text-align:center;padding:22px 8px}
  .done .tick{width:66px;height:66px;border-radius:50%;background:#eaf0f8;border:2px solid var(--acc);color:var(--acc);font-size:34px;line-height:62px;margin:0 auto 12px}
  .done h2{margin:0 0 6px;font-size:20px}
  .done p{color:var(--tx2);font-size:14px;margin:0;line-height:1.5}
  .foot{text-align:center;color:var(--tx3);font-size:11px;margin-top:10px}
  .hide{display:none}
  .err{text-align:center;color:var(--tx2);padding:30px 12px;font-size:15px;line-height:1.5}
  a.call{display:inline-block;margin-top:10px;color:var(--acc);font-weight:700;text-decoration:none;font-size:15px}
  .langbar{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:0 0 16px}
  .langbar button{padding:6px 12px;border:1px solid var(--bd);background:#fff;color:var(--tx2);border-radius:18px;font-size:13px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent}
  .langbar button.on{background:var(--acc);border-color:var(--acc);color:#fff}
  [dir="rtl"] .row .v{text-align:left}
</style>
</head>

    var nm=(SNAP&&SNAP.pax_name)?String(SNAP.pax_name).split(' ')[0]:'';
    if($('sub'))$('sub').textContent=nm?t('hi').replace('{name}',nm):t('sub');
    if($('revealP'))$('revealP').textContent=t('revealP');
    if($('revealBtn'))$('revealBtn').textContent=t('revealBtn');
    if($('foot'))$('foot').textContent=t('foot');
  }
  function $(id){return document.getElementById(id);}
  function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  async function rpc(fn,body){
    var r=await fetch(SB+'/rest/v1/rpc/'+fn,{method:'POST',headers:{'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(!r.ok)throw new Error('HTTP '+r.status);
    var t=await r.text();return t?JSON.parse(t):null;
  }
  async function load(){
    renderLangBar();
    if(!token){$('loading').textContent=t('loadingMissing');return;}
    try{
      var d=await rpc('wx_link_get',{p_token:token});
      if(!d||!d.snapshot){$('loading').innerHTML='<div class="err">'+t('loadingNotFound')+'</div>';return;}
      SNAP=d.snapshot; ACTED=d.action||null;
      VIEW='reveal';
      applyStatic();
      $('loading').classList.add('hide');
      $('revealCard').classList.remove('hide');
    }catch(e){$('loading').innerHTML='<div class="err">'+t('loadingError')+'</div>';}
  }
  function ack(action,note){try{rpc('wx_link_ack',{p_token:token,p_action:action,p_note:note||null});}catch(e){}}
  function reveal(){
    ack('view');
    $('revealCard').classList.add('hide');
    VIEW='detail';
    renderDetail();
  }
  function renderDetail(){
    var s=SNAP||{}, st=s.wx_status||'';
    var pickup=(s.pickup_loc||s.pickup_time);
    var b = !st              ? {c:'b-am',t:t('bk_pending_t'),s:t('bk_pending_s')}
          : st==='cancelled' ? {c:'b-no',t:t('bk_cancelled_t'),s:t('bk_cancelled_s')}
          : st==='final'     ? {c:'b-am',t:t('bk_final_t'),s:t('bk_final_s')}
          :                    {c:'b-on',t:t('bk_on_t'),s:t('bk_on_s')};
    var h='<div class="card">';
    h+='<div class="banner '+b.c+'"><div class="t">'+b.t+'</div><div class="s">'+esc(b.s)+'</div></div>';
    if(s.dep_label)h+='<div class="row"><span class="k">'+t('r_flight')+'</span><span class="v">'+esc(s.dep_label)+'</span></div>';
    if(s.dep_time)h+='<div class="row"><span class="k">'+t('r_departure')+'</span><span class="v">'+esc(s.dep_time)+(s.fr_date_label?' · '+esc(s.fr_date_label):'')+'</span></div>';
    if(s.wx_reasons&&s.wx_reasons.length)h+='<div class="row"><span class="k">'+t('r_conditions')+'</span><span class="v"><span class="tags">'+s.wx_reasons.map(function(r){return '<span class="tag">'+esc(_wxRsnT(r))+'</span>';}).join('')+'</span></span></div>';
    if(st==='cancelled'&&s.next_day)h+='<div class="row"><span class="k">'+t('r_nextday')+'</span><span class="v">'+esc(s.next_day)+'</span></div>';
    if(!st)h+='<div class="note">'+t('note_pending').replace('{x}',(s.dep_time?' ('+esc(s.dep_time)+')':''))+'</div>';
    if(st==='final')h+='<div class="note">'+t('note_final')+(s.wx_reasons&&s.wx_reasons.length?' ('+t('because_of')+' '+esc(s.wx_reasons.map(function(r){return _wxRsnT(r);}).join(', '))+')':'')+'</div>';
    // NOTE: the weather-call comment is INTERNAL and intentionally not shown to the customer.
    // (A separate customer-facing "manual comment" may be added later.)
    h+='</div>';

    if(st==='cancelled'){
      h+='<div class="card"><div class="row" style="border:none;padding-bottom:10px"><span class="k" style="font-weight:700;color:var(--tx)">'+t('whatdo')+'</span></div>'+
         '<button class="go" onclick="act(\'contact\')">'+t('btn_reschedule')+'</button>'+
         '<button class="sec" onclick="act(\'refund\')">'+t('btn_refund')+'</button></div>';
    } else if(st){
      if(pickup){
        // "Already self-drive" is derived from the pickup location actually shown (so a real pickup
        // like "Driftaway Queenstown" keeps the make-my-own-way option), not a possibly-stale flag.
        var selfAlready=/self.?drive|walk.?in|own (transport|car|vehicle)/i.test(String(s.pickup_loc||''));
        h+='<div class="card"><div class="row" style="border:none;padding-bottom:4px"><span class="k" style="font-weight:700;color:var(--tx)">'+t('yourpickup')+'</span></div>';
        if(s.pickup_loc)h+='<div class="row"><span class="k">'+t('r_location')+'</span><span class="v">'+esc(s.pickup_loc)+'</span></div>';
        if(s.pickup_time)h+='<div class="row"><span class="k">'+t('r_pickuptime')+'</span><span class="v">'+esc(s.pickup_time)+'</span></div>';
        h+='<button class="go" style="margin-top:14px;background:var(--ok)" onclick="act(\'confirmed\')">'+t('btn_confirm_pickup')+'</button>'+
           (selfAlready?'':'<button class="sec" onclick="act(\'self_drive\')">'+t('btn_selfdrive')+'</button>')+
           '<button class="sec" onclick="act(\'change_pickup\')">'+t('btn_changepickup')+'</button></div>';
      } else {
        h+='<div class="card"><button class="go" style="background:var(--ok)" onclick="act(\'confirmed\')">'+t('btn_confirm_got')+'</button>'+
           '<button class="sec" onclick="act(\'change_pickup\')">'+t('btn_changepickup')+'</button></div>';
      }
      if(st==='final')h+='<div class="card"><button class="sec" onclick="act(\'contact\')">'+t('btn_contactme')+'</button></div>';
    }
    if(s.op_phone)h+='<div style="text-align:center"><a class="call" href="tel:'+esc(s.op_phone)+'">'+t('call')+' · '+esc(s.op_phone)+'</a></div>';
    $('detail').innerHTML=h;
    $('detail').classList.remove('hide');
  }
  function act(a){
    ack(a);
    LAST_ACTION=a;
    VIEW='done';
    renderDone(a);
  }
  function _wxMinus30(tstr){
    var m=String(tstr||'').match(/(\d{1,2})\D?(\d{2})/);if(!m)return '';
    var mins=(+m[1])*60+(+m[2])-30;if(mins<0)mins+=1440;
    var hh=Math.floor(mins/60),mm=mins%60;return (hh<10?'0':'')+hh+':'+(mm<10?'0':'')+mm;
  }
  function renderDone(a){
    var keys={confirmed:'confirmed',refund:'refund',contact:'contact',self_drive:'selfdrive',change_pickup:'changepickup'};
    var k=keys[a];
    $('doneTitle').textContent=k?t('d_'+k+'_t'):t('thankyou');
    var ms=k?t('d_'+k+'_m'):'';
    if(a==='self_drive'){var ci=_wxMinus30(SNAP&&SNAP.dep_time);ms=ms.replace('{ci}',ci?(' '+t('checkin_self').replace('{time}',ci)):'');}
    else ms=ms.replace('{ci}','');
    $('doneMsg').textContent=ms;
    $('detail').classList.add('hide');
    $('doneCard').classList.remove('hide');
    window.scrollTo(0,0);
  }
  load();
</script>
</body>
</html>
